<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal LemburKu</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body { background-color: #f9fafb; font-family: sans-serif; }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .pdf-container { font-family: 'Times New Roman', Times, serif; color: #000; }
  </style>
</head>
<body>
  <div id="root">
    <div style="text-align: center; margin-top: 20vh; font-family: sans-serif; color: #6b7280;">
      <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: #2563eb; margin-bottom: 15px;"></i>
      <p>Memuat Aplikasi...</p>
      <small style="font-size: 12px; color: #9ca3af;">Jika tampilan ini tidak berubah, periksa koneksi internet Anda.</small>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, Fragment } = React;

    // ==========================================
    // KONFIGURASI SUPABASE
    // ==========================================
    const SUPABASE_URL = 'https://xjrunvxerkyzchhvwqqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqcnVudnhlcmt5emNoaHZ3cXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc2NzUsImV4cCI6MjA5MDM2MzY3NX0.JhHTCpohg3_tJis4KJUhIihCwYkOej7lpWVkBh5exno'; 
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icon = ({ name, className }) => <i className={`fa-solid fa-${name} ${className}`}></i>;

    // Helper Sort Tanggal Terkecil -> Terbesar yang Aman
    const sortDateAsc = (a, b) => {
      if (!a.tanggal) return 1;
      if (!b.tanggal) return -1;
      return new Date(a.tanggal) - new Date(b.tanggal);
    };

    // Helper Hitung Durasi Lembur (Tipe Angka / Desimal)
    const calculateDuration = (start, end) => {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      let diff = (eh * 60 + em) - (sh * 60 + sm);
      if (diff < 0) diff += 24 * 60; // Jika lintas hari
      return Number((diff / 60).toFixed(2));
    };

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState(''); 
      
      const [users, setUsers] = useState([]);
      const [savedOvertimes, setSavedOvertimes] = useState([]);
      const [lokasiList, setLokasiList] = useState([]); 
      const [projectList, setProjectList] = useState([]); 
      const [jabatanList, setJabatanList] = useState([]); 
      
      const [isLoading, setIsLoading] = useState(true);
      const [isConfigured, setIsConfigured] = useState(true);
      const [userToEdit, setUserToEdit] = useState(null);

      // --- 1. MENGAMBIL DATA DARI SUPABASE ---
      useEffect(() => {
        const fetchData = async () => {
          if (SUPABASE_URL.includes('YOUR_PROJECT_URL') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) {
            setIsConfigured(false); setIsLoading(false); return;
          }

          try {
            const [usersRes, overtimesRes, lokasiRes, projectRes, jabatanRes] = await Promise.all([
              supabase.from('users').select('*'),
              supabase.from('overtimes').select('*'),
              supabase.from('lokasi_kerja').select('*'),
              supabase.from('projects').select('*'),
              supabase.from('jabatans').select('*') 
            ]);

            if (usersRes.error) throw usersRes.error;
            if (overtimesRes.error) throw overtimesRes.error;

            const mappedUsers = usersRes.data ? usersRes.data.map(u => ({...u, lokasiKerja: u.lokasi_kerja, approverNik: u.approver_nik, jabatan: u.jabatan})) : [];
            const mappedOvertimes = overtimesRes.data ? overtimesRes.data.map(o => ({...o, jamMulai: o.jam_mulai, jamBerakhir: o.jam_berakhir, status: o.status || 'Pending', alasanReject: o.alasan_reject, approvedBy: o.approved_by, approvedAt: o.approved_at})) : [];
            const mappedLokasi = lokasiRes.data ? lokasiRes.data.map(l => ({...l, namaLokasi: l.nama_lokasi})) : [];
            const mappedProjects = projectRes.data ? projectRes.data.map(p => ({...p, namaProject: p.nama_project})) : [];
            const mappedJabatans = jabatanRes.data ? jabatanRes.data.map(j => ({...j, namaJabatan: j.nama_jabatan})) : [];

            setUsers(mappedUsers);
            setSavedOvertimes(mappedOvertimes);
            setLokasiList(mappedLokasi);
            setProjectList(mappedProjects);
            setJabatanList(mappedJabatans);
          } catch (err) {
            console.error("Gagal memuat data:", err);
          } finally {
            setIsLoading(false);
          }
        };

        fetchData();
      }, []);

      const handleLogin = (user) => {
        setCurrentUser(user);
        if (user.role === 'admin') setActiveTab('master_data');
        else if (user.role === 'approval') setActiveTab('approval_dashboard');
        else setActiveTab('input');
      };

      const handleLogout = () => { setCurrentUser(null); setActiveTab(''); };

      const handleEditUserRedirect = (emp) => { setUserToEdit(emp); setActiveTab('master_data'); };

      // --- 2. HANDLERS SUPABASE CRUD ---
      const handleSaveUser = async (userObj) => {
        const dbPayload = { 
          nik: userObj.nik, password: userObj.password, nama: userObj.nama, role: userObj.role, 
          lokasi_kerja: userObj.lokasiKerja, jabatan: userObj.jabatan, project: userObj.project, approver_nik: userObj.approverNik || null
        };
        const existingIndex = users.findIndex(u => String(u.nik) === String(userObj.nik));
        if (existingIndex >= 0) {
          const updatedUsers = [...users]; updatedUsers[existingIndex] = userObj; setUsers(updatedUsers);
        } else {
          setUsers([...users, userObj]);
        }
        await supabase.from('users').upsert([dbPayload]);
      };

      const handleDeleteUser = async (nik) => {
        if (confirm("Hapus karyawan ini?")) {
          setUsers(users.filter(u => String(u.nik) !== String(nik)));
          await supabase.from('users').delete().eq('nik', nik);
        }
      };

      const handleSaveUserList = async (newUsers) => {
        const updatedUsers = [...users];
        const dbPayloads = newUsers.map(newUser => {
          const existingIndex = updatedUsers.findIndex(u => String(u.nik) === String(newUser.nik));
          if (existingIndex >= 0) updatedUsers[existingIndex] = newUser; else updatedUsers.push(newUser);
          return { nik: newUser.nik, password: newUser.password, nama: newUser.nama, role: newUser.role, lokasi_kerja: newUser.lokasiKerja, jabatan: newUser.jabatan, project: newUser.project, approver_nik: newUser.approverNik || null };
        });
        setUsers(updatedUsers);
        await supabase.from('users').upsert(dbPayloads);
      };

      const handleSaveMaster = async (table, dataObj) => {
        let payload = {};
        if (table === 'lokasi_kerja') {
          payload = { id: dataObj.id, nama_lokasi: dataObj.namaLokasi };
          setLokasiList(prev => {
            const existing = prev.findIndex(x => String(x.id) === String(dataObj.id));
            if (existing >= 0) { const copy = [...prev]; copy[existing] = dataObj; return copy; }
            return [...prev, dataObj];
          });
        } else if (table === 'projects') {
          payload = { id: dataObj.id, nama_project: dataObj.namaProject };
          setProjectList(prev => {
            const existing = prev.findIndex(x => String(x.id) === String(dataObj.id));
            if (existing >= 0) { const copy = [...prev]; copy[existing] = dataObj; return copy; }
            return [...prev, dataObj];
          });
        } else if (table === 'jabatans') {
          payload = { id: dataObj.id, nama_jabatan: dataObj.namaJabatan };
          setJabatanList(prev => {
            const existing = prev.findIndex(x => String(x.id) === String(dataObj.id));
            if (existing >= 0) { const copy = [...prev]; copy[existing] = dataObj; return copy; }
            return [...prev, dataObj];
          });
        }
        await supabase.from(table).upsert([payload]);
      };

      const handleDeleteMaster = async (table, id) => {
        if (confirm("Hapus data ini?")) {
          if (table === 'lokasi_kerja') setLokasiList(prev => prev.filter(x => String(x.id) !== String(id)));
          else if (table === 'projects') setProjectList(prev => prev.filter(x => String(x.id) !== String(id)));
          else if (table === 'jabatans') setJabatanList(prev => prev.filter(x => String(x.id) !== String(id)));
          await supabase.from(table).delete().eq('id', id);
        }
      };

      const handleSaveOvertime = async (newData) => {
        // PERBAIKAN: Pastikan status 'Pending' masuk ke memori lokal agar langsung terbaca di Dashboard Atasan
        const processedData = newData.map(ot => ({ ...ot, status: 'Pending' }));
        setSavedOvertimes([...processedData, ...savedOvertimes]); 
        const dbPayloads = processedData.map(ot => ({
          id: ot.id, nik: ot.nik, tanggal: ot.tanggal, jam_mulai: ot.jamMulai, jam_berakhir: ot.jamBerakhir, status: ot.status, timestamp: ot.timestamp
        }));
        await supabase.from('overtimes').insert(dbPayloads);
      };

      const handleUpdateOvertime = async (id, updatedFields) => {
        setSavedOvertimes(savedOvertimes.map(ot => ot.id === id ? { ...ot, ...updatedFields } : ot));
        const dbPayload = { jam_mulai: updatedFields.jamMulai, jam_berakhir: updatedFields.jamBerakhir };
        await supabase.from('overtimes').update(dbPayload).eq('id', id);
      };

      const handleDeleteOvertime = async (id) => {
        if(confirm("Hapus pengajuan lembur ini?")) {
          setSavedOvertimes(savedOvertimes.filter(ot => ot.id !== id));
          await supabase.from('overtimes').delete().eq('id', id);
        }
      };

      const handleUpdateOvertimeStatus = async (id, status, reason = null, approvedBy = null) => {
        const approvedAt = status === 'Approved' ? new Date().toISOString() : null;
        const updatedOvertimes = savedOvertimes.map(ot => {
          if (ot.id === id) return { ...ot, status, alasanReject: reason, approvedBy, approvedAt };
          return ot;
        });
        setSavedOvertimes(updatedOvertimes);
        
        const payload = { status, approved_by: approvedBy, approved_at: approvedAt };
        if (reason) payload.alasan_reject = reason;
        await supabase.from('overtimes').update(payload).eq('id', id);
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center"><Icon name="circle-notch" className="fa-spin fa-2x text-blue-600" /></div>;
      if (!currentUser) return <Login onLogin={handleLogin} users={users} isConfigured={isConfigured} />;

      const isStaffUser = currentUser.role === 'employee' || currentUser.role === 'approval';

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800">
          <nav className={`${currentUser.role === 'admin' ? 'bg-indigo-700' : 'bg-blue-600'} text-white shadow-md`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
              <div className="font-bold text-xl"><Icon name="clock" className="mr-2"/>LemburKu</div>
              <div className="flex items-center space-x-4">
                <span className="text-sm px-3 py-1 rounded-full border hidden sm:block bg-black/20">{currentUser.nama}</span>
                <button onClick={handleLogout} className="hover:text-white px-3 py-2 rounded-lg text-sm bg-black/20"><Icon name="right-from-bracket" /> Keluar</button>
              </div>
            </div>
          </nav>

          <div className="max-w-7xl mx-auto px-4 py-8">
            {/* TABS MENU KARYAWAN */}
            {currentUser.role === 'employee' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-2xl border overflow-x-auto">
                <button onClick={() => setActiveTab('input')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'input' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500'}`}><Icon name="file-lines" /> Input Lembur</button>
                <button onClick={() => setActiveTab('history')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'history' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500'}`}><Icon name="clock-rotate-left" /> Histori Lembur</button>
                <button onClick={() => setActiveTab('cetak')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'cetak' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500'}`}><Icon name="print" /> Cetak SPKL</button>
              </div>
            )}

            {/* TABS MENU APPROVER */}
            {currentUser.role === 'approval' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-lg border overflow-x-auto">
                <button onClick={() => setActiveTab('approval_dashboard')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'approval_dashboard' ? 'bg-orange-50 text-orange-700 shadow-sm' : 'text-gray-500'}`}><Icon name="check-to-slot" /> Persetujuan Lembur</button>
                <button onClick={() => setActiveTab('approver_report')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'approver_report' ? 'bg-orange-50 text-orange-700 shadow-sm' : 'text-gray-500'}`}><Icon name="file-excel" /> Report Lembur</button>
              </div>
            )}

            {/* TABS MENU ADMIN */}
            {currentUser.role === 'admin' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-2xl border overflow-x-auto">
                <button onClick={() => setActiveTab('master_data')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'master_data' ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-gray-500'}`}><Icon name="database" /> Master Data</button>
                <button onClick={() => setActiveTab('daftar_karyawan')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'daftar_karyawan' ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-gray-500'}`}><Icon name="users" /> Daftar Karyawan</button>
                <button onClick={() => setActiveTab('report')} className={`flex-1 py-2.5 px-3 text-sm font-medium rounded-lg ${activeTab === 'report' ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-gray-500'}`}><Icon name="file-excel" /> Report Lembur</button>
              </div>
            )}

            <div className="transition-all duration-300">
              {currentUser.role === 'employee' && activeTab === 'input' && <InputLembur user={currentUser} onSave={handleSaveOvertime} />}
              {currentUser.role === 'employee' && activeTab === 'history' && <HistoryLembur user={currentUser} historyData={savedOvertimes} onEdit={handleUpdateOvertime} onDelete={handleDeleteOvertime} />}
              {currentUser.role === 'employee' && activeTab === 'cetak' && <CetakSPKL user={currentUser} historyData={savedOvertimes} users={users} />}
              
              {currentUser.role === 'approval' && activeTab === 'approval_dashboard' && <ApprovalDashboard user={currentUser} users={users} overtimes={savedOvertimes} onUpdateStatus={handleUpdateOvertimeStatus} />}
              {currentUser.role === 'approval' && activeTab === 'approver_report' && <ApproverReportLembur user={currentUser} users={users} overtimes={savedOvertimes} />}
              
              {currentUser.role === 'admin' && activeTab === 'master_data' && 
                <AdminMasterData 
                  users={users} lokasiList={lokasiList} projectList={projectList} jabatanList={jabatanList}
                  onSaveUser={handleSaveUser} onSaveUserList={handleSaveUserList}
                  onSaveMaster={handleSaveMaster} onDeleteMaster={handleDeleteMaster}
                  userToEdit={userToEdit} clearUserToEdit={() => setUserToEdit(null)}
                />
              }
              {currentUser.role === 'admin' && activeTab === 'daftar_karyawan' && <AdminDaftarKaryawan users={users} lokasiList={lokasiList} projectList={projectList} onEditUser={handleEditUserRedirect} onDeleteUser={handleDeleteUser} />}
              {currentUser.role === 'admin' && activeTab === 'report' && <AdminReportLembur users={users} overtimes={savedOvertimes} lokasiList={lokasiList} projectList={projectList} />}
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN LOGIN ---
    function Login({ onLogin, users, isConfigured }) {
      const [nik, setNik] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        
        // BYPASS ADMIN: Memastikan admin selalu bisa login. Dibuat case-insensitive (kebal huruf besar/kecil)
        if (nik.trim().toLowerCase() === 'admin' && password.trim().toLowerCase() === 'admin') {
          const adminUser = users.find(u => String(u.nik).toLowerCase() === 'admin') || {
              nik: 'admin', nama: 'Administrator', role: 'admin',
              lokasiKerja: '-', project: '-', jabatan: '-'
          };
          onLogin(adminUser);
          return;
        }

        if (!isConfigured) {
          setError('Aplikasi belum dikonfigurasi dengan Supabase API Key.');
          return;
        }

        const user = users.find(u => String(u.nik) === String(nik).trim() && String(u.password) === String(password));
        if (user) {
          setError('');
          onLogin(user);
        } else {
          setError('NIK atau Password salah. Silakan periksa kembali.');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-100 px-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-8 text-center text-white">
              <Icon name="clock" className="text-5xl mb-3 block" />
              <h2 className="text-2xl font-bold">Portal LemburKu</h2>
            </div>
            <div className="px-6 py-8">
              {!isConfigured && (
                <div className="mb-4 bg-yellow-50 border-l-4 border-yellow-400 p-3 flex items-start rounded text-sm text-yellow-800">
                  <Icon name="triangle-exclamation" className="mr-2 mt-0.5 text-yellow-500" />
                  <p>Aplikasi dalam mode pratinjau. Anda harus memasukkan SUPABASE_URL dan SUPABASE_ANON_KEY di dalam kode agar bisa login selain Admin.</p>
                </div>
              )}
              {error && (
                <div className="mb-4 bg-red-50 border-l-4 border-red-500 p-3 flex items-start rounded text-sm text-red-800">
                  <Icon name="circle-exclamation" className="mr-2 mt-0.5" />
                  <p>{error}</p>
                </div>
              )}
              <form onSubmit={handleSubmit} className="space-y-6">
                <div>
                  <label className="block text-sm font-medium mb-2">NIK</label>
                  <input type="text" required value={nik} onChange={e=>setNik(e.target.value)} className="w-full px-3 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Masukkan NIK" />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2">Password</label>
                  <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-3 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" />
                </div>
                <button type="submit" className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm text-sm font-medium transition-colors">Masuk</button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN MASTER BOX ---
    function MasterBox({ title, icon, dataList, nameKey, val, setVal, tableName, onSaveMaster, onDeleteMaster }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border mb-4">
          <div className="bg-blue-50 px-4 py-2 border-b flex items-center font-semibold text-blue-900"><Icon name={icon} className="mr-2"/>{title}</div>
          <form onSubmit={e=>{e.preventDefault(); onSaveMaster(tableName, {id: Date.now().toString(), [nameKey]: val}); setVal('');}} className="p-3 border-b flex gap-2">
            <input type="text" required value={val} onChange={e=>setVal(e.target.value)} className="w-full border rounded px-2 py-1 text-sm" placeholder="Nama..." />
            <button type="submit" className="bg-blue-600 text-white px-3 py-1 rounded text-sm">Add</button>
          </form>
          <div className="max-h-[150px] overflow-y-auto">
            <table className="min-w-full text-sm"><tbody className="divide-y">{dataList.map(item => (
              <tr key={item.id} className="hover:bg-gray-50"><td className="px-3 py-2">{item[nameKey]}</td><td className="text-right px-3"><Icon name="trash" className="text-red-500 cursor-pointer" onClick={()=>onDeleteMaster(tableName, item.id)}/></td></tr>
            ))}</tbody></table>
          </div>
        </div>
      );
    }

    // --- KOMPONEN ADMIN: MASTER DATA ---
    function AdminMasterData({ users, lokasiList, projectList, jabatanList, onSaveUser, onSaveUserList, onSaveMaster, onDeleteMaster, userToEdit, clearUserToEdit }) {
      const emptyUserForm = { project: '', lokasiKerja: '', nik: '', nama: '', password: '', jabatan: '', role: 'employee', approverNik: '' };
      const [userFormData, setUserFormData] = useState(emptyUserForm);
      const [isEditUserMode, setIsEditUserMode] = useState(false);
      
      const [locName, setLocName] = useState(''); const [projName, setProjName] = useState(''); const [jabName, setJabName] = useState('');

      const approvers = users.filter(u => u.role === 'approval' && u.lokasiKerja === userFormData.lokasiKerja);

      const handleUserChange = (e) => setUserFormData({ ...userFormData, [e.target.name]: e.target.value });

      useEffect(() => {
        if (userToEdit) {
          setUserFormData({
            project: userToEdit.project || '', lokasiKerja: userToEdit.lokasiKerja || '', nik: userToEdit.nik || '', 
            nama: userToEdit.nama || '', password: userToEdit.password || '', jabatan: userToEdit.jabatan || '', 
            role: userToEdit.role || 'employee', approverNik: userToEdit.approverNik || ''
          });
          setIsEditUserMode(true); clearUserToEdit(); window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, [userToEdit, clearUserToEdit]);

      const handleUserSubmit = (e) => {
        e.preventDefault();
        if (userFormData.role === 'employee' && !userFormData.approverNik) return alert('Atasan wajib dipilih untuk Karyawan.');
        onSaveUser(userFormData);
        setUserFormData(emptyUserForm); setIsEditUserMode(false); alert("Karyawan berhasil disimpan!");
      };

      const handleImportExcel = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
          const newUsers = jsonData.map(row => {
            const r = {}; Object.keys(row).forEach(k => r[k.toLowerCase().trim()] = row[k]);
            return {
              project: String(r['project']||''), lokasiKerja: String(r['lokasi kerja']||''), nik: String(r['nik']||''),
              nama: String(r['nama lengkap']||r['nama']||''), password: String(r['password']||''), jabatan: String(r['jabatan']||''),
              role: String(r['role']||'employee').toLowerCase(), approverNik: String(r['nik atasan']||'')
            };
          }).filter(u => u.nik && u.nama); 
          if(newUsers.length > 0) { onSaveUserList(newUsers); alert(`${newUsers.length} data karyawan berhasil diimport!`); }
        };
        reader.readAsArrayBuffer(file);
      };

            <MasterBox title="Master Jabatan" icon="id-badge" dataList={jabatanList} nameKey="namaJabatan" val={jabName} setVal={setJabName} tableName="jabatans" onSaveMaster={onSaveMaster} onDeleteMaster={onDeleteMaster} />

          <div className="lg:col-span-3">
            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
              <div className="bg-indigo-50 px-6 py-4 border-b flex justify-between items-center border-indigo-100">

                  <div><label className="block text-xs font-semibold mb-1">Lokasi</label><select name="lokasiKerja" required value={userFormData.lokasiKerja} onChange={handleUserChange} className="w-full border rounded-md px-3 py-2 text-sm"><option value="" disabled>-- Pilih --</option>{lokasiList.map(l=><option key={l.id}>{l.namaLokasi}</option>)}</select></div>

    // --- KOMPONEN ADMIN: DAFTAR KARYAWAN ---
    function AdminDaftarKaryawan({ users, lokasiList, projectList, onEditUser, onDeleteUser }) {
      const [filterProject, setFilterProject] = useState('Semua');
      const [filterLokasi, setFilterLokasi] = useState('Semua');
      const [appliedP, setAppliedP] = useState('Semua'); 
      const [appliedL, setAppliedL] = useState('Semua');

      const approvers = users.filter(u => u.role === 'approval');

      let filtered = users.filter(u => u.role !== 'admin');
      if (appliedP !== 'Semua') filtered = filtered.filter(u => u.project === appliedP);
      if (appliedL !== 'Semua') filtered = filtered.filter(u => u.lokasiKerja === appliedL);

      const groupedEmployees = filtered.reduce((acc, emp) => {
        const loc = emp.lokasiKerja || 'Tanpa Lokasi';
        if (!acc[loc]) acc[loc] = [];
        acc[loc].push(emp);
        return acc;
      }, {});

      const sortedLocations = Object.keys(groupedEmployees).sort();

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in">

               <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} className="px-2 py-1.5 text-xs border rounded-md outline-none"><option value="Semua">Semua Project</option>{projectList.map(p=><option key={p.id}>{p.namaProject}</option>)}</select>
               <select value={filterLokasi} onChange={e=>setFilterLokasi(e.target.value)} className="px-2 py-1.5 text-xs border rounded-md outline-none"><option value="Semua">Semua Lokasi</option>{lokasiList.map(l=><option key={l.id}>{l.namaLokasi}</option>)}</select>
               <button onClick={()=>{setAppliedP(filterProject); setAppliedL(filterLokasi);}} className="px-4 py-1.5 rounded-md text-xs text-white bg-indigo-600 shadow hover:bg-indigo-700 transition"><Icon name="magnifying-glass" className="mr-1"/> Cari</button>

           </div>
           <div className="overflow-x-auto">
             <table className="min-w-full divide-y">
               <thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">NIK/NAMA</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">JABATAN & ROLE</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">PROJECT</th><th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">AKSI</th></tr></thead>

                     {groupedEmployees[loc].map(emp => {
                       const approver = approvers.find(a => a.nik === emp.approverNik);
                       return (
                         <tr key={emp.nik} className="hover:bg-gray-50 transition-colors">
                           <td className="px-4 py-3"><div className="font-medium text-gray-900">{emp.nama}</div><div className="text-xs text-gray-500">{emp.nik}</div></td>
                           <td className="px-4 py-3 text-sm">
                             <div className="text-gray-800 font-medium">{emp.jabatan || '-'}</div>
                             <div className="mt-1"><span className={`px-2 py-0.5 rounded text-[10px] uppercase font-semibold ${emp.role === 'approval' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}`}>{emp.role}</span></div>

    // --- KOMPONEN ADMIN & APPROVER: REPORT LEMBUR ---
    function AdminReportLembur({ users, overtimes, lokasiList, projectList }) {
      const [fProj, setFProj] = useState('Semua'); const [fLoc, setFLoc] = useState('Semua'); const [fStat, setFStat] = useState('Semua');
      const [dFrom, setDFrom] = useState(''); const [dTo, setDTo] = useState('');
      const [applied, setApplied] = useState({}); 

      const reportData = overtimes.map(ot => {
        const u = users.find(x => String(x.nik) === String(ot.nik)) || {};
        return { ...ot, nama: u.nama, lokasiKerja: u.lokasiKerja, project: u.project, jabatan: u.jabatan, status: ot.status || 'Pending' };
      });

      let filtered = reportData.filter(i => {
        if(applied.fProj && applied.fProj !== 'Semua' && i.project !== applied.fProj) return false;
        if(applied.fLoc && applied.fLoc !== 'Semua' && i.lokasiKerja !== applied.fLoc) return false;
        if(applied.fStat && applied.fStat !== 'Semua' && i.status !== applied.fStat) return false;
        if(applied.dFrom && i.tanggal < applied.dFrom) return false;
        if(applied.dTo && i.tanggal > applied.dTo) return false;
        return true;
      }).sort(sortDateAsc);

      const handleDownloadExcel = () => {
        if (filtered.length === 0) return alert("Tidak ada data untuk diunduh.");
        const headers = ['NIK', 'Nama Lengkap', 'Jabatan', 'Lokasi Kerja', 'Project', 'Tanggal', 'Jam Mulai', 'Jam Akhir', 'Durasi (Jam)', 'Status', 'Keterangan Reject'];
        const csvRows = filtered.map(i => [i.nik, `"${i.nama}"`, `"${i.jabatan}"`, `"${i.lokasiKerja}"`, `"${i.project}"`, i.tanggal, i.jamMulai, i.jamBerakhir, calculateDuration(i.jamMulai, i.jamBerakhir), i.status, `"${i.alasanReject || ''}"`].join(','));
        const blob = new Blob([[headers.join(','), ...csvRows].join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.setAttribute('download', `Report_Lembur.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in">
          <div className="bg-indigo-50 px-6 py-4 border-b flex flex-wrap gap-3 items-center justify-between border-indigo-100">
            <div className="font-semibold text-indigo-900"><Icon name="file-excel" className="mr-2"/> Laporan Lembur</div>
            <div className="flex flex-wrap gap-2 text-sm items-center">
              <select value={fProj} onChange={e=>setFProj(e.target.value)} className="border rounded px-2 py-1.5 text-xs outline-none"><option value="Semua">Project</option>{projectList.map(p=><option key={p.id}>{p.namaProject}</option>)}</select>
              <select value={fLoc} onChange={e=>setFLoc(e.target.value)} className="border rounded px-2 py-1.5 text-xs outline-none"><option value="Semua">Lokasi</option>{lokasiList.map(l=><option key={l.id}>{l.namaLokasi}</option>)}</select>
              <select value={fStat} onChange={e=>setFStat(e.target.value)} className="border rounded px-2 py-1.5 text-xs outline-none"><option value="Semua">Status</option><option>Pending</option><option>Approved</option><option>Rejected</option></select>
              <input type="date" value={dFrom} onChange={e=>setDFrom(e.target.value)} className="border rounded px-2 py-1.5 text-xs outline-none" title="Dari Tanggal"/>
              <span className="text-gray-400 text-xs">-</span>
              <input type="date" value={dTo} onChange={e=>setDTo(e.target.value)} className="border rounded px-2 py-1.5 text-xs outline-none" title="Sampai Tanggal"/>
              <button onClick={()=>setApplied({fProj, fLoc, fStat, dFrom, dTo})} className="bg-indigo-600 text-white px-3 py-1.5 rounded text-xs font-medium shadow hover:bg-indigo-700 transition"><Icon name="magnifying-glass" className="mr-1"/> Cari</button>
              <button onClick={handleDownloadExcel} className="bg-green-600 text-white px-3 py-1.5 rounded text-xs font-medium shadow hover:bg-green-700 transition"><Icon name="download" className="mr-1"/> Excel</button>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y"><thead className="bg-gray-50 text-xs text-gray-500 uppercase text-left"><tr><th className="px-4 py-3">Tgl</th><th className="px-4 py-3">Karyawan</th><th className="px-4 py-3">Waktu & Durasi</th><th className="px-4 py-3">Status</th></tr></thead>
              <tbody className="divide-y text-sm">
                {filtered.length > 0 ? filtered.map(i => (
                  <tr key={i.id} className="hover:bg-gray-50">
                    <td className="px-4 py-3 font-medium">{i.tanggal}</td>
                    <td className="px-4 py-3"><div className="font-medium text-gray-900">{i.nama}</div><div className="text-xs text-gray-500">{i.jabatan} | {i.project}</div></td>
                    <td className="px-4 py-3">
                      <div className="text-gray-800">{i.jamMulai} - {i.jamBerakhir}</div>
                      <div className="text-xs text-blue-600 font-semibold mt-0.5"><Icon name="stopwatch" className="mr-1"/>{calculateDuration(i.jamMulai, i.jamBerakhir)} Jam</div>
                    </td>
                    <td className="px-4 py-3 font-bold">
                       <span className={i.status === 'Approved' ? 'text-green-600' : (i.status === 'Rejected' ? 'text-red-600' : 'text-yellow-600')}>{i.status}</span>
                       {i.status==='Rejected' && <span className="text-xs font-normal block text-gray-600 mt-1 whitespace-normal break-words max-w-[200px]">Ket: {i.alasanReject}</span>}
                    </td>
                  </tr>
                )) : <tr><td colSpan="4" className="px-4 py-8 text-center text-gray-500">Tidak ada data.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- KOMPONEN APPROVER DASHBOARD ---
    function ApprovalDashboard({ user, users, overtimes, onUpdateStatus }) {
      // Pastikan komparasi NIK sangat aman dari huruf besar/kecil dan spasi
      const bawahanNiks = users
        .filter(u => u.approverNik && String(u.approverNik).trim().toLowerCase() === String(user.nik).trim().toLowerCase())
        .map(u => String(u.nik).trim().toLowerCase());
      
      // Urutkan Tanggal Terkecil (Ascending) & handle status undefined dari input baru
      const approvalData = overtimes
        .filter(ot => ot.nik && bawahanNiks.includes(String(ot.nik).trim().toLowerCase()) && (ot.status || 'Pending').toLowerCase() === 'pending')
        .sort(sortDateAsc);
        
      const [rejectId, setRejectId] = useState(null); 
      const [reason, setReason] = useState('');

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in">
          <div className="bg-orange-50 px-6 py-4 border-b font-semibold text-orange-900"><Icon name="check-to-slot" className="mr-2"/> Daftar Persetujuan Lembur (Pending)</div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y text-sm">
              <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left font-semibold text-gray-500 uppercase text-xs">Tgl</th><th className="px-6 py-3 text-left font-semibold text-gray-500 uppercase text-xs">Karyawan</th><th className="px-6 py-3 text-left font-semibold text-gray-500 uppercase text-xs">Waktu</th><th className="px-6 py-3 text-center font-semibold text-gray-500 uppercase text-xs">Aksi</th></tr></thead>
              <tbody className="divide-y">
                {approvalData.map(ot => {
                  const emp = users.find(u => String(u.nik).trim() === String(ot.nik).trim()) || {};
                  return (
                    <tr key={ot.id} className="hover:bg-gray-50 transition-colors">
                      <td className="px-6 py-4 font-medium">{ot.tanggal}</td>
                      <td className="px-6 py-4"><div className="font-bold text-gray-800">{emp.nama}</div><div className="text-xs text-gray-500">{emp.jabatan}</div></td>
                      <td className="px-6 py-4"><span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs font-semibold">{ot.jamMulai}</span> - <span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs font-semibold">{ot.jamBerakhir}</span></td>
                      <td className="px-6 py-4 text-center">
                        {rejectId === ot.id ? (
                          <div className="flex flex-col gap-1">
                            <input type="text" placeholder="Alasan..." className="border px-2 py-1.5 text-xs outline-none focus:border-red-400 rounded" value={reason} onChange={e=>setReason(e.target.value)}/>
                            <div className="flex justify-center gap-1">
                              <button onClick={()=>{onUpdateStatus(ot.id, 'Rejected', reason); setRejectId(null); setReason('');}} className="bg-red-600 text-white px-3 py-1.5 text-[10px] font-bold rounded">OK</button>
                              <button onClick={()=>setRejectId(null)} className="bg-gray-200 text-gray-700 px-3 py-1.5 text-[10px] font-bold rounded">Batal</button>
                            </div>
                          </div>
                        ) : (
                          <div className="flex justify-center gap-2">
                            <button onClick={()=>onUpdateStatus(ot.id, 'Approved', null, user.nama)} className="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm transition">Approve</button>
                            <button onClick={()=>setRejectId(ot.id)} className="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm transition">Reject</button>
                          </div>
                        )}
                      </td>
                    </tr>
                  );
                })}
                {approvalData.length===0 && (
                  <tr>
                    <td colSpan="4" className="text-center py-10 text-gray-500">
                      <p>Tidak ada pengajuan lembur yang menunggu persetujuan Anda.</p>
                      <p className="text-xs mt-2 text-gray-400">Pastikan NIK Anda terdaftar sebagai "Set Atasan" pada menu Master Karyawan bawahan Anda.</p>
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

              <select value={fNama} onChange={e=>setFNama(e.target.value)} className="w-full md:w-auto px-2 py-1.5 text-xs border border-gray-300 rounded-md bg-white">
                 <option value="Semua">Semua Karyawan</option>
                 {bawahanNames.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
              <select value={fStat} onChange={e=>setFStat(e.target.value)} className="w-full md:w-auto px-2 py-1.5 text-xs border border-gray-300 rounded-md bg-white">
                 <option value="Semua">Semua Status</option>
                 <option value="Pending">Pending</option>
                 <option value="Approved">Approved</option>
                 <option value="Rejected">Rejected</option>
              </select>
              <div className="flex items-center bg-white border border-gray-300 rounded-md px-2 py-1.5 text-xs w-full md:w-auto">
                <span className="text-gray-500 mr-2">Dari:</span>
                <input type="date" value={dFrom} onChange={(e) => setDFrom(e.target.value)} className="outline-none w-full md:w-auto"/>
              </div>
              <div className="flex items-center bg-white border border-gray-300 rounded-md px-2 py-1.5 text-xs w-full md:w-auto">
                <span className="text-gray-500 mr-2">Sampai:</span>
                <input type="date" value={dTo} onChange={(e) => setDateTo(e.target.value)} className="outline-none w-full md:w-auto"/>
              </div>
              <button onClick={()=>setApplied({fNama, fStat, dFrom, dTo})} className="bg-orange-600 hover:bg-orange-700 text-white px-4 py-1.5 rounded text-xs font-bold shadow-sm transition w-full md:w-auto">
                <Icon name="magnifying-glass" className="mr-1.5"/> Cari
              </button>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y text-sm">
              <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tgl</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu & Durasi</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status & Ket</th></tr></thead>
              <tbody className="divide-y">
                {filtered.length > 0 ? filtered.map(i => (
                  <tr key={i.id} className="hover:bg-gray-50">
                    <td className="px-6 py-3 font-medium">{i.tanggal}</td>
                    <td className="px-6 py-3"><div className="font-medium text-gray-900">{i.nama}</div><div className="text-xs text-gray-500">{i.jabatan}</div></td>
                    <td className="px-6 py-3">
                      <div className="text-gray-800 font-medium">{i.jamMulai} - {i.jamBerakhir}</div>
                      <div className="text-xs text-blue-600 font-semibold mt-0.5"><Icon name="stopwatch" className="mr-1"/>{calculateDuration(i.jamMulai, i.jamBerakhir)} Jam</div>
                    </td>
                    <td className="px-6 py-3 text-xs">
                      <span className={i.status === 'Approved' ? 'text-green-600 font-bold' : (i.status === 'Rejected' ? 'text-red-600 font-bold' : 'text-yellow-600 font-bold')}>{i.status}</span>
                      {i.status==='Rejected' && i.alasanReject && <span className="text-gray-600 mt-1 block whitespace-normal break-words max-w-[200px]" title={i.alasanReject}>Ket: {i.alasanReject}</span>}
                    </td>
                  </tr>
                )) : <tr><td colSpan="4" className="text-center py-8 text-gray-500">Tidak ada data sesuai filter.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- KOMPONEN KARYAWAN ---
    function InputLembur({ user, onSave }) {
      const [entries, setEntries] = useState([{ id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!entries.every(e => e.tanggal && e.jamMulai && e.jamBerakhir)) return alert('Lengkapi data jam lembur.');
        const dataToSave = entries.map(entry => ({ id: entry.id+Math.random().toString().substr(2,5), nik: user.nik, tanggal: entry.tanggal, jamMulai: entry.jamMulai, jamBerakhir: entry.jamBerakhir, timestamp: new Date().toISOString() }));
        await onSave(dataToSave);
        alert('Data pengajuan berhasil dikirim!'); setEntries([{ id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
      };

      return (
        <div className="space-y-6 animate-fade-in max-w-3xl mx-auto">
          <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div className="bg-gray-50 px-6 py-4 border-b"><h3 className="text-lg font-semibold text-gray-800">Profil Karyawan</h3></div>
            <div className="p-6 grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Nama</p><p className="font-medium text-gray-900">{user.nama}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Jabatan</p><p className="text-gray-800">{user.jabatan || '-'}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Lokasi</p><p className="text-gray-800">{user.lokasiKerja}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Project</p><p className="text-gray-800">{user.project}</p></div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h3 className="text-lg font-semibold border-b pb-3 mb-4 text-gray-800">Form Input Lembur</h3>
            <form onSubmit={handleSubmit}>
              {entries.map(en => (
                <div key={en.id} className="flex flex-col md:flex-row gap-3 mb-3 p-3 bg-gray-50 rounded-lg border">
                  <div className="flex-1"><label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Tanggal</label><input type="date" required value={en.tanggal} onChange={e=>setEntries(entries.map(x=>x.id===en.id?{...x, tanggal:e.target.value}:x))} className="border border-gray-300 px-3 py-2 rounded-md w-full text-sm outline-none" /></div>
                  <div className="flex-1"><label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Jam Mulai</label><input type="time" required value={en.jamMulai} onChange={e=>setEntries(entries.map(x=>x.id===en.id?{...x, jamMulai:e.target.value}:x))} className="border border-gray-300 px-3 py-2 rounded-md w-full text-sm outline-none" /></div>
                  <div className="flex-1"><label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Jam Akhir</label><input type="time" required value={en.jamBerakhir} onChange={e=>setEntries(entries.map(x=>x.id===en.id?{...x, jamBerakhir:e.target.value}:x))} className="border border-gray-300 px-3 py-2 rounded-md w-full text-sm outline-none" /></div>
                  <div className="flex items-end pb-1">{entries.length > 1 && <button type="button" onClick={()=>setEntries(entries.filter(x=>x.id!==en.id))} className="text-red-500 hover:bg-red-50 p-2 rounded-md transition"><Icon name="trash"/></button>}</div>
                </div>
              ))}
              <div className="flex justify-between mt-4 items-center">
                <button type="button" onClick={()=>setEntries([...entries, {id:Date.now(), tanggal:'', jamMulai:'', jamBerakhir:''}])} className="text-blue-600 font-medium text-sm hover:underline"><Icon name="plus" className="mr-1"/> Tambah Baris</button>
                <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm transition">Kirim Pengajuan</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function HistoryLembur({ user, historyData }) {
      const data = historyData
        .filter(i => String(i.nik).trim().toLowerCase() === String(user.nik).trim().toLowerCase())
        .map(ot => ({ ...ot, status: ot.status || 'Pending' }))
        .sort(sortDateAsc);

      const getStatusBadge = (status) => {
        switch(status) {
          case 'Approved': return <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[11px] font-bold uppercase"><Icon name="check" className="mr-1" />{status}</span>;
          case 'Rejected': return <span className="bg-red-100 text-red-700 px-2 py-1 rounded text-[11px] font-bold uppercase"><Icon name="xmark" className="mr-1" />{status}</span>;
          default: return <span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[11px] font-bold uppercase"><Icon name="clock" className="mr-1" />{status}</span>;
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in max-w-4xl mx-auto">
          <div className="bg-blue-50 px-6 py-4 border-b font-semibold text-blue-900 border-blue-100"><Icon name="clock-rotate-left" className="mr-2"/> Histori Lembur Anda</div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y text-sm">
              <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left font-semibold text-gray-500 uppercase text-xs">Tanggal</th><th className="px-6 py-3 text-left font-semibold text-gray-500 uppercase text-xs">Waktu & Durasi</th><th className="px-6 py-3 text-center font-semibold text-gray-500 uppercase text-xs">Status & Ket</th></tr></thead>
              <tbody className="divide-y">
                {data.map(ot => (
                  <tr key={ot.id} className="hover:bg-gray-50 transition-colors">
                    <td className="px-6 py-4 font-medium text-gray-800">{ot.tanggal}</td>
                    <td className="px-6 py-4">
                      <div className="font-medium text-gray-600">{ot.jamMulai} - {ot.jamBerakhir}</div>
                      <div className="text-xs text-blue-600 font-semibold mt-0.5"><Icon name="stopwatch" className="mr-1"/>{calculateDuration(ot.jamMulai, ot.jamBerakhir)} Jam</div>
                    </td>
                    <td className="px-6 py-4 text-center">
                      <div className="mb-1">{getStatusBadge(ot.status)}</div>
                      {ot.status === 'Rejected' && ot.alasanReject && <div className="text-[10px] text-gray-600 mt-1 whitespace-normal break-words max-w-[200px] mx-auto text-left" title={ot.alasanReject}>Ket: {ot.alasanReject}</div>}
                    </td>
                  </tr>
                ))}
                {data.length === 0 && <tr><td colSpan="3" className="text-center py-8 text-gray-500">Anda belum pernah mengajukan lembur.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- KOMPONEN CETAK SPKL KARYAWAN ---
    function CetakSPKL({ user, historyData, users }) {
      const [dFrom, setDFrom] = useState(''); const [dTo, setDTo] = useState('');
      const [previewData, setPreviewData] = useState(null);

      const approver = users.find(u => String(u.nik).trim().toLowerCase() === String(user.approverNik).trim().toLowerCase());

      const handlePreview = () => {
        if(!dFrom || !dTo) return alert("Pilih tanggal dari dan sampai.");
        // Filter: Hanya Status Approved, Dalam Rentang Tanggal, Urut Tanggal Terkecil (Ascending)
        const data = historyData.filter(ot => String(ot.nik).trim().toLowerCase() === String(user.nik).trim().toLowerCase() && ot.status === 'Approved' && ot.tanggal >= dFrom && ot.tanggal <= dTo).sort(sortDateAsc);
        if(data.length === 0) return alert("Tidak ada data lembur yang 'Approved' pada rentang waktu ini.");
        setPreviewData(data);
      };

      const handleDownloadPDF = () => {
        const element = document.getElementById('spkl-document');
        const opt = {
          margin:       [15, 15, 15, 15], // Margin: Atas, Kiri, Bawah, Kanan (dalam milimeter)
          filename:     `SPKL_${user.nama}_${dFrom}_to_${dTo}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true }, 
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
      };

      return (
        <div className="space-y-6 animate-fade-in max-w-4xl mx-auto">
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h3 className="font-semibold mb-4 text-blue-900 border-b pb-3 border-blue-100"><Icon name="print" className="mr-2"/>Cetak SPKL PDF</h3>
            <div className="flex flex-wrap gap-4 items-end">
              <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Dari Tanggal</label><input type="date" value={dFrom} onChange={e=>setDFrom(e.target.value)} className="border border-gray-300 rounded-md px-3 py-2 text-sm outline-none" /></div>
              <div><label className="block text-xs font-bold text-gray-500 uppercase mb-1">Sampai Tanggal</label><input type="date" value={dTo} onChange={e=>setDTo(e.target.value)} className="border border-gray-300 rounded-md px-3 py-2 text-sm outline-none" /></div>
              <button onClick={handlePreview} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md text-sm font-bold shadow-sm transition h-[38px]"><Icon name="eye" className="mr-1.5"/> Preview Dokumen</button>
            </div>
            <p className="text-[11px] text-gray-400 mt-3">*Dokumen SPKL hanya akan menampilkan daftar lembur yang telah disetujui (Approved) oleh atasan Anda.</p>
          </div>

          {previewData && (
            <div className="animate-fade-in">
              <div className="flex justify-end mb-3"><button onClick={handleDownloadPDF} className="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow-md font-bold text-sm transition"><Icon name="file-pdf" className="mr-2"/> Download PDF</button></div>
              
              {/* AREA CETAK PDF */}
              <div className="overflow-x-auto bg-gray-200 p-6 rounded-xl flex justify-center border border-gray-300">
                
                {/* KANVAS A4 (Lebar di-set presisi di 180mm agar muat sempurna di JS-PDF dgn Margin 15mm) */}
                <div id="spkl-document" className="bg-white text-black pdf-container box-border mx-auto text-[13px] shadow-md" style={{ width: '180mm', padding: '10mm', minHeight: '260mm' }}>
                  
                  {/* Bagian Header & Logo */}
                  <div className="flex justify-between items-center mb-8 border-b-2 border-black pb-4">
                    <div className="flex-1 pr-4">
                      <h2 className="font-bold text-2xl uppercase tracking-wide text-left text-gray-900 leading-tight">Persetujuan Surat Perintah <br/>Kerja Lembur</h2>
                    </div>
                    <div className="flex-shrink-0 text-right pl-4">
                      {/* Ganti URL src di bawah ini dengan URL logo asli yang di-hosting di tempat yang support CORS (Misal: imgBB) */}
                      <img 
                        src="https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png" 
                        alt="Logo Perusahaan" 
                        className="h-14 w-auto object-contain ml-auto" 
                        onError={(e) => { e.target.src = 'https://dummyimage.com/200x60/ffffff/000000.png&text=LOGO+PERUSAHAAN'; }}
                      />
                    </div>
                  </div>
                  
                  <table className="mb-8 w-full max-w-lg text-sm">
                    <tbody>
                      <tr><td className="py-1.5 w-32 font-semibold text-gray-800">Nama</td><td className="text-gray-900">: {user.nama}</td></tr>
                      <tr><td className="py-1.5 font-semibold text-gray-800">NIK</td><td className="text-gray-900">: {user.nik}</td></tr>
                      <tr><td className="py-1.5 font-semibold text-gray-800">Jabatan</td><td className="text-gray-900">: {user.jabatan || '-'}</td></tr>
                      <tr><td className="py-1.5 font-semibold text-gray-800">Lokasi / Project</td><td className="text-gray-900">: {user.lokasiKerja} / {user.project}</td></tr>
                      <tr><td className="py-1.5 font-semibold text-gray-800">Periode Lembur</td><td className="text-gray-900">: {dFrom} <span className="mx-1">s/d</span> {dTo}</td></tr>
                    </tbody>
                  </table>

                  <table className="w-full border-collapse border border-gray-800 mb-16 text-sm">
                    <thead>
                      <tr className="bg-gray-100">
                        <th className="border border-gray-800 p-2.5 text-left text-gray-900">Tgl Lembur</th>
                        <th className="border border-gray-800 p-2.5 text-center text-gray-900">Waktu Mulai</th>
                        <th className="border border-gray-800 p-2.5 text-center text-gray-900">Waktu Berakhir</th>
                        <th className="border border-gray-800 p-2.5 text-center text-gray-900">Status</th>
                        <th className="border border-gray-800 p-2.5 text-center text-gray-900">Tgl Approved</th>
                      </tr>
                    </thead>
                    <tbody>
                      {previewData.map(ot => {
                        const appDate = ot.approvedAt ? new Date(ot.approvedAt).toLocaleDateString('id-ID') : '-';
                        return (
                          <tr key={ot.id}>
                            <td className="border border-gray-800 p-2.5 font-medium text-gray-900">{ot.tanggal}</td>
                            <td className="border border-gray-800 p-2.5 text-center text-gray-800">{ot.jamMulai}</td>
                            <td className="border border-gray-800 p-2.5 text-center text-gray-800">{ot.jamBerakhir}</td>
                            <td className="border border-gray-800 p-2.5 text-center leading-tight text-gray-800">Approved by<br/><b>{ot.approvedBy || (approver ? approver.nama : '-')}</b></td>
                            <td className="border border-gray-800 p-2.5 text-center text-gray-800">{appDate}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>

                  <div className="grid grid-cols-3 gap-4 mt-16 px-2 text-center text-sm">
                    <div>
                      <p className="mb-24 text-gray-800">Pemohon,</p>
                      <p className="font-bold underline text-gray-900">{user.nama}</p>
                      <p className="text-xs mt-1 text-gray-600">NIK: {user.nik}</p>
                    </div>
                    <div>
                      <p className="mb-24 text-gray-800">Menyetujui,</p>
                      <p className="font-bold underline text-gray-900">{approver ? approver.nama : '(.......................)'}</p>
                      <p className="text-xs mt-1 text-gray-600">Atasan Langsung</p>
                    </div>
                    <div>
                      <p className="mb-24 text-gray-800">Menyetujui,</p>
                      <p className="font-bold underline text-gray-900">(.......................)</p>
                      <p className="text-xs mt-1 text-gray-600">HRD Lokasi</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
