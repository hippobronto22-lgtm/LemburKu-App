<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal LemburKu</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tambahkan library SheetJS untuk memproses Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- TAMBAHKAN SUPABASE JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #f9fafb; font-family: sans-serif; }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- KONFIGURASI SUPABASE ---
    // PENTING: Ganti dengan URL dan Anon Key dari Project Supabase Anda!
    // PASTIKAN KEY BERADA DI DALAM TANDA KUTIP '' SEPERTI DI BAWAH INI
    const SUPABASE_URL = 'https://xjrunvxerkyzchhvwqqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqcnVudnhlcmt5emNoaHZ3cXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc2NzUsImV4cCI6MjA5MDM2MzY3NX0.JhHTCpohg3_tJis4KJUhIihCwYkOej7lpWVkBh5exno'; 
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icon = ({ name, className }) => <i className={`fa-solid fa-${name} ${className}`}></i>;

    const BULAN_OPTIONS = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState(''); 
      
      const [users, setUsers] = useState([]);
      const [savedOvertimes, setSavedOvertimes] = useState([]);
      const [lokasiList, setLokasiList] = useState([]); // State untuk Lokasi Kerja
      const [isLoading, setIsLoading] = useState(true);

      // --- MENGAMBIL DATA DARI SUPABASE ---
      useEffect(() => {
        const fetchData = async () => {
          try {
            const [usersRes, overtimesRes, lokasiRes] = await Promise.all([
              supabase.from('users').select('*'),
              supabase.from('overtimes').select('*'),
              supabase.from('lokasi_kerja').select('*')
            ]);

            if (usersRes.error) throw usersRes.error;
            if (overtimesRes.error) throw overtimesRes.error;
            if (lokasiRes.error) throw lokasiRes.error;

            // Mapping format snake_case (DB) ke camelCase (React Frontend)
            const mappedUsers = usersRes.data.map(u => ({...u, lokasiKerja: u.lokasi_kerja, jenisKelamin: u.jenis_kelamin}));
            const mappedOvertimes = overtimesRes.data.map(o => ({...o, jamMulai: o.jam_mulai, jamBerakhir: o.jam_berakhir, fileName: o.file_name, fileUrl: o.file_url}));
            const mappedLokasi = lokasiRes.data.map(l => ({...l, namaLokasi: l.nama_lokasi}));

            setUsers(mappedUsers);
            setSavedOvertimes(mappedOvertimes);
            setLokasiList(mappedLokasi);
          } catch (err) {
            alert("Gagal memuat data dari Supabase: " + err.message);
          } finally {
            setIsLoading(false);
          }
        };

        fetchData();
      }, []);

      const handleLogin = (user) => {
        setCurrentUser(user);
        if (user.role === 'admin') setActiveTab('master_data');
        else setActiveTab('input');
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveTab('');
      };

      // --- Handlers Karyawan (Supabase) ---
      const handleSaveUser = async (userObj) => {
        const dbPayload = { nik: userObj.nik, password: userObj.password, nama: userObj.nama, role: userObj.role, lokasi_kerja: userObj.lokasiKerja, jenis_kelamin: userObj.jenisKelamin, project: userObj.project };
        
        const existingIndex = users.findIndex(u => String(u.nik) === String(userObj.nik));
        if (existingIndex >= 0) {
          const updatedUsers = [...users];
          updatedUsers[existingIndex] = userObj;
          setUsers(updatedUsers);
        } else {
          setUsers([...users, userObj]);
        }
        
        const { error } = await supabase.from('users').upsert([dbPayload]);
        if (error) alert('Error menyimpan karyawan: ' + error.message);
      };

      const handleDeleteUser = async (nik) => {
        if (confirm("Yakin ingin menghapus karyawan ini?")) {
          setUsers(users.filter(u => String(u.nik) !== String(nik)));
          
          const { error } = await supabase.from('users').delete().eq('nik', nik);
          if (error) alert('Error menghapus karyawan: ' + error.message);
        }
      };

      // --- Handler Batch Insert Karyawan (Supabase) ---
      const handleSaveUserList = async (newUsers) => {
        const updatedUsers = [...users];
        const dbPayloads = [];

        newUsers.forEach(newUser => {
          const existingIndex = updatedUsers.findIndex(u => String(u.nik) === String(newUser.nik));
          if (existingIndex >= 0) updatedUsers[existingIndex] = newUser;
          else updatedUsers.push(newUser);

          dbPayloads.push({ nik: newUser.nik, password: newUser.password, nama: newUser.nama, role: newUser.role, lokasi_kerja: newUser.lokasiKerja, jenis_kelamin: newUser.jenisKelamin, project: newUser.project });
        });
        setUsers(updatedUsers);

        const { error } = await supabase.from('users').upsert(dbPayloads);
        if (error) alert('Error Import karyawan massal: ' + error.message);
      };

      // --- Handlers Lokasi Kerja (Supabase) ---
      const handleSaveLokasi = async (locObj) => {
        const dbPayload = { id: locObj.id, nama_lokasi: locObj.namaLokasi };

        const existingIndex = lokasiList.findIndex(l => String(l.id) === String(locObj.id));
        if (existingIndex >= 0) {
          const updatedLokasi = [...lokasiList];
          updatedLokasi[existingIndex] = locObj;
          setLokasiList(updatedLokasi);
        } else {
          setLokasiList([...lokasiList, locObj]);
        }

        const { error } = await supabase.from('lokasi_kerja').upsert([dbPayload]);
        if (error) alert('Error menyimpan lokasi: ' + error.message);
      };

      const handleDeleteLokasi = async (id) => {
        if (confirm("Yakin ingin menghapus lokasi ini? Data karyawan yang menggunakan lokasi ini mungkin akan terpengaruh.")) {
          setLokasiList(lokasiList.filter(l => String(l.id) !== String(id)));
          
          const { error } = await supabase.from('lokasi_kerja').delete().eq('id', id);
          if (error) alert('Error menghapus lokasi: ' + error.message);
        }
      };

      const handleSaveOvertime = async (newData) => {
        setSavedOvertimes([...savedOvertimes, ...newData]);
        
        const dbPayloads = newData.map(ot => ({
          id: ot.id, nik: ot.nik, periode: ot.periode, tanggal: ot.tanggal, 
          jam_mulai: ot.jamMulai, jam_berakhir: ot.jamBerakhir, 
          file_name: ot.fileName, file_url: ot.fileUrl, timestamp: ot.timestamp
        }));

        const { error } = await supabase.from('overtimes').insert(dbPayloads);
        if (error) alert('Error menyimpan data lembur: ' + error.message);
      };

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
            <Icon name="circle-notch" className="h-10 w-10 text-blue-600 animate-spin mb-4" />
            <p className="text-gray-600 font-medium">Menghubungkan ke Database...</p>
          </div>
        );
      }

      if (!currentUser) return <Login onLogin={handleLogin} users={users} />;

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800">
          <nav className={`${currentUser.role === 'admin' ? 'bg-indigo-700' : 'bg-blue-600'} text-white shadow-md transition-colors`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <div className="flex items-center space-x-2">
                  <Icon name={currentUser.role === 'admin' ? "shield-halved" : "clock"} className="text-xl" />
                  <span className="font-bold text-xl tracking-wide">{currentUser.role === 'admin' ? 'Admin Portal' : 'LemburKu'}</span>
                </div>
                <div className="flex items-center space-x-4">
                  <span className={`text-sm px-3 py-1 rounded-full border hidden sm:block ${currentUser.role === 'admin' ? 'bg-indigo-800 border-indigo-500' : 'bg-blue-700 border-blue-500'}`}>
                    {currentUser.nama} ({currentUser.nik})
                  </span>
                  <button onClick={handleLogout} className={`flex items-center space-x-1 hover:text-white px-3 py-2 rounded-lg text-sm font-medium ${currentUser.role === 'admin' ? 'bg-indigo-800 hover:bg-indigo-900' : 'bg-blue-700 hover:bg-blue-800'}`}>
                    <Icon name="right-from-bracket" /><span>Keluar</span>
                  </button>
                </div>
              </div>
            </div>
          </nav>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {currentUser.role === 'employee' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-md border border-gray-100">
                <button onClick={() => setActiveTab('input')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 text-sm font-medium rounded-lg transition-all ${activeTab === 'input' ? 'bg-blue-50 text-blue-700 shadow-sm border border-blue-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="file-lines" /> <span>Input Lembur</span>
                </button>
                <button onClick={() => setActiveTab('history')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 text-sm font-medium rounded-lg transition-all ${activeTab === 'history' ? 'bg-blue-50 text-blue-700 shadow-sm border border-blue-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="clock-rotate-left" /> <span>Histori Lembur</span>
                </button>
              </div>
            )}

            {currentUser.role === 'admin' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-md border border-gray-100">
                <button onClick={() => setActiveTab('master_data')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 text-sm font-medium rounded-lg transition-all ${activeTab === 'master_data' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="users" /> <span>Master Data</span>
                </button>
                <button onClick={() => setActiveTab('report')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 text-sm font-medium rounded-lg transition-all ${activeTab === 'report' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="file-excel" /> <span>Report Lembur</span>
                </button>
              </div>
            )}

            <div className="transition-all duration-300">
              {currentUser.role === 'employee' && activeTab === 'input' && <InputLembur user={currentUser} onSave={handleSaveOvertime} />}
              {currentUser.role === 'employee' && activeTab === 'history' && <HistoryLembur user={currentUser} historyData={savedOvertimes} />}
              {currentUser.role === 'admin' && activeTab === 'master_data' && 
                <AdminMasterData 
                  users={users} 
                  lokasiList={lokasiList} 
                  onSaveUser={handleSaveUser} 
                  onDeleteUser={handleDeleteUser}
                  onSaveUserList={handleSaveUserList}
                  onSaveLokasi={handleSaveLokasi}
                  onDeleteLokasi={handleDeleteLokasi}
                />
              }
              {currentUser.role === 'admin' && activeTab === 'report' && <AdminReportLembur users={users} overtimes={savedOvertimes} />}
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN LOGIN ---
    function Login({ onLogin, users }) {
      const [nik, setNik] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        const user = users.find(u => String(u.nik) === String(nik) && String(u.password) === String(password));
        if (user) {
          setError('');
          onLogin(user);
        } else {
          setError('NIK atau Password salah.');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-100 px-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-8 text-center text-white">
              <Icon name="clock" className="text-5xl text-blue-100 mb-3 block" />
              <h2 className="text-2xl font-bold">Portal Karyawan</h2>
              <p className="text-blue-100 text-sm mt-1">Sistem Manajemen Waktu & Lembur</p>
            </div>
            <div className="px-6 py-8">
              {error && <div className="mb-4 bg-red-50 border-l-4 border-red-500 p-4 flex items-start"><Icon name="circle-exclamation" className="text-red-500 mr-2 mt-0.5" /><p className="text-sm text-red-700">{error}</p></div>}
              <form onSubmit={handleSubmit} className="space-y-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">NIK</label>
                  <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icon name="user" className="text-gray-400" /></div><input type="text" required value={nik} onChange={(e) => setNik(e.target.value)} className="block w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm" placeholder="Masukkan NIK" /></div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                  <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icon name="key" className="text-gray-400" /></div><input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm" placeholder="••••••••" /></div>
                </div>
                <button type="submit" className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm text-sm font-medium transition-colors">Masuk</button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN ADMIN: MASTER DATA (LOKASI & KARYAWAN) ---
    function AdminMasterData({ users, lokasiList, onSaveUser, onDeleteUser, onSaveUserList, onSaveLokasi, onDeleteLokasi }) {
      
      // State Form Karyawan
      const emptyUserForm = { nik: '', password: '', nama: '', lokasiKerja: '', jenisKelamin: 'Laki-laki', project: '' };
      const [userFormData, setUserFormData] = useState(emptyUserForm);
      const [isEditUserMode, setIsEditUserMode] = useState(false);
      const [userMsg, setUserMsg] = useState({ text: '', type: '' }); // type: 'success' | 'error'

      // State Form Lokasi
      const emptyLocForm = { id: '', namaLokasi: '' };
      const [locFormData, setLocFormData] = useState(emptyLocForm);
      const [isEditLocMode, setIsEditLocMode] = useState(false);

      const employees = users.filter(u => u.role === 'employee');

      // Helper Notif Karyawan
      const showUserMsg = (text, type = 'success') => {
        setUserMsg({ text, type });
        setTimeout(() => setUserMsg({ text: '', type: '' }), 4000);
      };

      // --- Handler Karyawan ---
      const handleUserChange = (e) => setUserFormData({ ...userFormData, [e.target.name]: e.target.value });
      
      const handleUserSubmit = (e) => {
        e.preventDefault();
        
        // Validasi Lokasi Kosong
        if (!userFormData.lokasiKerja && lokasiList.length > 0) {
           userFormData.lokasiKerja = lokasiList[0].namaLokasi; // Default ambil yang pertama
        }

        if (!isEditUserMode && users.find(u => String(u.nik) === String(userFormData.nik))) {
          showUserMsg('NIK sudah terdaftar.', 'error');
          return;
        }

        onSaveUser({ ...userFormData, role: 'employee' });
        showUserMsg(isEditUserMode ? 'Karyawan diupdate!' : 'Karyawan ditambahkan!');
        setUserFormData(emptyUserForm);
        setIsEditUserMode(false);
      };

      const handleEditUserBtn = (emp) => {
        setUserFormData({
          nik: emp.nik || '', password: emp.password || '', nama: emp.nama || '', 
          lokasiKerja: emp.lokasiKerja || '', jenisKelamin: emp.jenisKelamin || 'Laki-laki', project: emp.project || ''
        });
        setIsEditUserMode(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleCancelUserEdit = () => {
        setUserFormData(emptyUserForm);
        setIsEditUserMode(false);
      };

      // --- Handler Import & Download Template Excel Karyawan ---
      const handleDownloadTemplate = () => {
        const ws_data = [
          ['nik', 'password', 'nama', 'jenisKelamin', 'lokasiKerja', 'project'],
          ['1001', 'pass123', 'Budi Santoso', 'Laki-laki', 'Kantor Pusat - Jakarta', 'Project A']
        ];
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "TemplateKaryawan");
        XLSX.writeFile(wb, "Template_Import_Karyawan.xlsx");
      };

      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            const newUsers = jsonData.map(row => ({
              nik: String(row.nik || ''),
              password: String(row.password || ''),
              nama: String(row.nama || ''),
              jenisKelamin: String(row.jenisKelamin || 'Laki-laki'),
              lokasiKerja: String(row.lokasiKerja || ''),
              project: String(row.project || ''),
              role: 'employee'
            })).filter(u => u.nik && u.nama); // Filter memastikan baris tersebut memiliki nik dan nama

            if (newUsers.length > 0) {
              onSaveUserList(newUsers);
              showUserMsg(`${newUsers.length} data karyawan berhasil diimport!`);
            } else {
              showUserMsg('Format data tidak valid atau file kosong.', 'error');
            }
          } catch (error) {
            showUserMsg('Gagal membaca file Excel.', 'error');
          }
          e.target.value = null; // Reset input file agar bisa upload file yang sama jika gagal
        };
        reader.readAsArrayBuffer(file);
      };

      // --- Handler Lokasi ---
      const handleLocChange = (e) => setLocFormData({ ...locFormData, [e.target.name]: e.target.value });

      const handleLocSubmit = (e) => {
        e.preventDefault();
        const payload = { ...locFormData, id: isEditLocMode ? locFormData.id : 'LOK-' + Date.now() };
        onSaveLokasi(payload);
        setLocFormData(emptyLocForm);
        setIsEditLocMode(false);
      };

      const handleEditLocBtn = (loc) => {
        setLocFormData({ id: loc.id, namaLokasi: loc.namaLokasi });
        setIsEditLocMode(true);
      };

      const handleCancelLocEdit = () => {
        setLocFormData(emptyLocForm);
        setIsEditLocMode(false);
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          
          {/* KOLOM KIRI: MASTER LOKASI KERJA */}
          <div className="lg:col-span-1 space-y-6">
            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
              <div className="bg-blue-50 px-4 py-3 border-b flex items-center gap-2">
                <Icon name="map-location-dot" className="text-blue-600" />
                <h3 className="text-base font-semibold text-blue-900">Master Lokasi Kerja</h3>
              </div>
              <div className="p-4 border-b">
                <form onSubmit={handleLocSubmit} className="space-y-3">
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Nama Lokasi</label>
                    <input type="text" name="namaLokasi" required value={locFormData.namaLokasi} onChange={handleLocChange} className="w-full border rounded-md px-3 py-2 text-sm" placeholder="Contoh: Site A - Sudirman" />
                  </div>
                  <div className="flex gap-2">
                    <button type="submit" className="flex-1 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-md font-medium">
                      {isEditLocMode ? 'Update' : 'Tambah'}
                    </button>
                    {isEditLocMode && (
                      <button type="button" onClick={handleCancelLocEdit} className="py-2 px-3 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-md">Batal</button>
                    )}
                  </div>
                </form>
              </div>
              <div className="p-0 max-h-[400px] overflow-y-auto">
                <table className="min-w-full divide-y">
                  <thead className="bg-gray-50 sticky top-0">
                    <tr><th className="px-4 py-2 text-left text-xs text-gray-500 uppercase">Lokasi</th><th className="px-4 py-2 text-right text-xs text-gray-500 uppercase">Aksi</th></tr>
                  </thead>
                  <tbody className="divide-y text-sm">
                    {lokasiList.length > 0 ? lokasiList.map(loc => (
                      <tr key={loc.id} className="hover:bg-gray-50">
                        <td className="px-4 py-2">{loc.namaLokasi}</td>
                        <td className="px-4 py-2 text-right">
                          <button onClick={() => handleEditLocBtn(loc)} className="text-blue-600 hover:bg-blue-50 p-1 rounded mr-1"><Icon name="pen-to-square"/></button>
                          <button onClick={() => onDeleteLokasi(loc.id)} className="text-red-600 hover:bg-red-50 p-1 rounded"><Icon name="trash"/></button>
                        </td>
                      </tr>
                    )) : <tr><td colSpan="2" className="text-center py-4 text-gray-500 text-xs">Data kosong</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* KOLOM KANAN: MASTER KARYAWAN */}
          <div className="lg:col-span-2 space-y-6">
            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
              <div className="bg-indigo-50 px-6 py-4 border-b flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <div className="flex items-center gap-2">
                  <Icon name="users-gear" className="text-indigo-600" />
                  <h3 className="text-lg font-semibold text-indigo-900">{isEditUserMode ? 'Edit Data Karyawan' : 'Tambah Karyawan Baru'}</h3>
                </div>
                
                {/* Tombol Import dan Download Template */}
                <div className="flex flex-wrap items-center gap-2">
                  <button type="button" onClick={handleDownloadTemplate} className="inline-flex items-center px-3 py-1.5 rounded-md text-xs font-medium text-indigo-700 bg-indigo-100 hover:bg-indigo-200 transition-colors">
                    <Icon name="download" className="mr-1.5"/> Template Excel
                  </button>
                  <label className="cursor-pointer inline-flex items-center px-3 py-1.5 rounded-md text-xs font-medium text-green-700 bg-green-100 hover:bg-green-200 transition-colors">
                    <Icon name="upload" className="mr-1.5"/> Import Excel
                    <input type="file" accept=".xlsx, .xls" className="sr-only" onChange={handleImportExcel} />
                  </label>
                </div>
              </div>
              <div className="p-6">
                {userMsg.text && (
                  <div className={`mb-4 p-3 rounded-lg flex items-center text-sm border ${userMsg.type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'}`}>
                    <Icon name={userMsg.type === 'error' ? 'circle-exclamation' : 'circle-check'} className="mr-2" /> {userMsg.text}
                  </div>
                )}
                
                <form onSubmit={handleUserSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">NIK</label><input type="text" name="nik" required value={userFormData.nik} onChange={handleUserChange} disabled={isEditUserMode} className={`block w-full border rounded-md px-3 py-2 text-sm ${isEditUserMode ? 'bg-gray-100 cursor-not-allowed' : ''}`} /></div>
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Password</label><input type="text" name="password" required value={userFormData.password} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm" /></div>
                  
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Nama Lengkap</label><input type="text" name="nama" required value={userFormData.nama} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm" /></div>
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Jenis Kelamin</label><select name="jenisKelamin" value={userFormData.jenisKelamin} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                  
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Lokasi Kerja</label>
                    <select name="lokasiKerja" required value={userFormData.lokasiKerja} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white">
                      <option value="" disabled>-- Pilih Lokasi --</option>
                      {lokasiList.map(loc => <option key={loc.id} value={loc.namaLokasi}>{loc.namaLokasi}</option>)}
                    </select>
                  </div>
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Data Project</label><input type="text" name="project" required value={userFormData.project} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm" placeholder="Nama Project..." /></div>
                  
                  <div className="md:col-span-2 flex justify-end mt-2 gap-2">
                    {isEditUserMode && <button type="button" onClick={handleCancelUserEdit} className="px-4 py-2 border rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Batal Edit</button>}
                    <button type="submit" className="px-4 py-2 rounded-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                      <Icon name={isEditUserMode ? "floppy-disk" : "plus"} className="mr-2"/>{isEditUserMode ? 'Update Karyawan' : 'Simpan Karyawan'}
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
               <div className="bg-gray-50 px-6 py-4 border-b"><h3 className="text-lg font-semibold text-gray-800">Daftar Karyawan</h3></div>
               <div className="overflow-x-auto">
                 <table className="min-w-full divide-y">
                   <thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">NIK/Nama</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">L/P</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Lokasi</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Project</th><th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Aksi</th></tr></thead>
                   <tbody className="bg-white divide-y">
                     {employees.length > 0 ? employees.map((emp) => (
                       <tr key={emp.nik} className="hover:bg-gray-50">
                         <td className="px-4 py-3">
                           <div className="text-sm font-medium text-gray-900">{emp.nama}</div>
                           <div className="text-xs text-gray-500">{emp.nik}</div>
                         </td>
                         <td className="px-4 py-3 text-sm text-gray-500">{emp.jenisKelamin === 'Laki-laki' ? 'L' : 'P'}</td>
                         <td className="px-4 py-3 text-sm text-gray-500">{emp.lokasiKerja}</td>
                         <td className="px-4 py-3 text-sm text-gray-500">{emp.project}</td>
                         <td className="px-4 py-3 text-right">
                           <button onClick={() => handleEditUserBtn(emp)} className="text-indigo-600 hover:bg-indigo-50 p-1.5 rounded mr-1" title="Edit"><Icon name="pen-to-square"/></button>
                           <button onClick={() => onDeleteUser(emp.nik)} className="text-red-600 hover:bg-red-50 p-1.5 rounded" title="Hapus"><Icon name="trash"/></button>
                         </td>
                       </tr>
                     )) : <tr><td colSpan="5" className="px-4 py-8 text-center text-sm text-gray-500">Belum ada data karyawan.</td></tr>}
                   </tbody>
                 </table>
               </div>
            </div>
          </div>

        </div>
      );
    }

    // --- KOMPONEN ADMIN: REPORT LEMBUR ---
    function AdminReportLembur({ users, overtimes }) {
      const [filterPeriode, setFilterPeriode] = useState('Semua');

      const reportData = overtimes.map(ot => {
        const user = users.find(u => String(u.nik) === String(ot.nik)) || {};
        return { ...ot, nama: user.nama || 'Unknown', lokasiKerja: user.lokasiKerja || '-', jenisKelamin: user.jenisKelamin || '-', project: user.project || '-' };
      });

      const filteredReport = filterPeriode === 'Semua' ? reportData : reportData.filter(item => item.periode === filterPeriode);

      const handleDownloadExcel = () => {
        if (filteredReport.length === 0) return alert("Tidak ada data untuk diunduh.");
        const headers = ['NIK', 'Nama Lengkap', 'Jenis Kelamin', 'Lokasi Kerja', 'Project', 'Periode', 'Tanggal', 'Jam Mulai', 'Jam Akhir', 'File SPKL', 'Link Download SPKL'];
        const csvRows = filteredReport.map(i => [i.nik, `"${i.nama}"`, i.jenisKelamin, `"${i.lokasiKerja}"`, `"${i.project}"`, i.periode, i.tanggal, i.jamMulai, i.jamBerakhir, `"${i.fileName}"`, `"${i.fileUrl || ''}"`].join(','));
        const blob = new Blob([[headers.join(','), ...csvRows].join('\n')], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', `Report_${filterPeriode}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
          <div className="bg-indigo-50 px-6 py-4 border-b flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
            <div className="flex items-center gap-2"><Icon name="file-excel" className="text-indigo-600"/> <h3 className="text-lg font-semibold text-indigo-900">Laporan Lembur</h3></div>
            <div className="flex items-center gap-3">
              <select value={filterPeriode} onChange={(e) => setFilterPeriode(e.target.value)} className="w-36 px-2 py-1.5 text-sm border-gray-300 rounded-md border"><option value="Semua">Semua Periode</option>{BULAN_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}</select>
              <button onClick={handleDownloadExcel} className="inline-flex items-center px-3 py-1.5 rounded-md text-sm font-medium text-white bg-green-600 hover:bg-green-700"><Icon name="download" className="mr-1.5"/> Excel</button>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y">
              <thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Karyawan</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Periode</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">SPKL</th></tr></thead>
              <tbody className="bg-white divide-y text-sm">
                {filteredReport.length > 0 ? filteredReport.map((item, idx) => (
                  <tr key={idx} className="hover:bg-gray-50">
                    <td className="px-4 py-3">
                      <div className="font-medium text-gray-900">{item.nama}</div>
                      <div className="text-xs text-gray-500">{item.nik} | {item.lokasiKerja} | Prj: {item.project}</div>
                    </td>
                    <td className="px-4 py-3 text-gray-600">{item.periode}</td>
                    <td className="px-4 py-3"><span className="font-medium">{item.tanggal}</span> <br/><span className="text-xs bg-blue-50 text-blue-700 px-1 rounded">{item.jamMulai} - {item.jamBerakhir}</span></td>
                    <td className="px-4 py-3 text-blue-600 truncate max-w-[120px]" title={item.fileName}>
                      {item.fileUrl ? (
                        <a href={item.fileUrl} target="_blank" rel="noopener noreferrer" className="hover:underline flex items-center">
                          <Icon name="file-lines" className="mr-1"/>{item.fileName}
                        </a>
                      ) : (
                        <span className="flex items-center"><Icon name="file-lines" className="mr-1"/>{item.fileName}</span>
                      )}
                    </td>
                  </tr>
                )) : <tr><td colSpan="4" className="px-4 py-8 text-center text-gray-500">Tidak ada data.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- KOMPONEN KARYAWAN: INPUT LEMBUR ---
    function InputLembur({ user, onSave }) {
      const currentMonth = BULAN_OPTIONS[new Date().getMonth()];
      const [periode, setPeriode] = useState(currentMonth);
      const [entries, setEntries] = useState([{ id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
      const [spklFile, setSpklFile] = useState(null);
      const [successMsg, setSuccessMsg] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleAddEntry = () => setEntries([...entries, { id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
      const handleRemoveEntry = (id) => entries.length > 1 && setEntries(entries.filter(e => e.id !== id));
      const handleChangeEntry = (id, field, val) => setEntries(entries.map(e => e.id === id ? { ...e, [field]: val } : e));
      
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file && file.type === 'application/pdf') setSpklFile(file);
        else { alert('Harap unggah file PDF.'); e.target.value = null; }
      };

      // Handle Submit dengan Supabase Storage
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!entries.every(e => e.tanggal && e.jamMulai && e.jamBerakhir)) return alert('Lengkapi data jam lembur.');
        if (!spklFile) return alert('Unggah form SPKL (PDF).');

        setIsSubmitting(true);

        try {
          // 1. Generate Nama File Unik & Upload ke Supabase Storage (Bucket: 'spkl_files')
          const fileExt = spklFile.name.split('.').pop();
          const uniqueFileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
          
          const { error: uploadError } = await supabase.storage
            .from('spkl_files')
            .upload(uniqueFileName, spklFile);

          if (uploadError) throw uploadError;

          // 2. Dapatkan URL Public untuk file tersebut
          const { data: publicUrlData } = supabase.storage
            .from('spkl_files')
            .getPublicUrl(uniqueFileName);

          const fileUrl = publicUrlData.publicUrl;

          // 3. Susun data lembur dan simpan ke Database via fungsi onSave
          const dataToSave = entries.map(entry => ({
            id: entry.id + Math.random().toString().substr(2, 5),
            nik: user.nik,
            periode: periode,
            tanggal: entry.tanggal,
            jamMulai: entry.jamMulai,
            jamBerakhir: entry.jamBerakhir,
            fileName: spklFile.name,
            fileUrl: fileUrl,
            timestamp: new Date().toISOString()
          }));

          await onSave(dataToSave); // Panggil fungsi di App()

          setSuccessMsg('Data berhasil disimpan!');
          setEntries([{ id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
          setSpklFile(null);
          document.getElementById('file-upload').value = '';
          setIsSubmitting(false);
          setTimeout(() => setSuccessMsg(''), 4000);

        } catch (error) {
          alert('Gagal mengupload file ke Supabase: ' + error.message);
          setIsSubmitting(false);
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div className="bg-gray-50 px-6 py-4 border-b"><h3 className="text-lg font-semibold text-gray-800">Profil Karyawan</h3></div>
            <div className="p-6 grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Nama</p><p className="font-medium">{user.nama}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">L/P</p><p>{user.jenisKelamin}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Lokasi</p><p>{user.lokasiKerja}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Project</p><p>{user.project}</p></div>
            </div>
          </div>

          {successMsg && <div className="bg-green-50 border border-green-200 p-4 rounded-xl flex items-center text-green-700 text-sm"><Icon name="circle-check" className="mr-3" />{successMsg}</div>}

          <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div className="bg-gray-50 px-6 py-4 border-b"><h3 className="text-lg font-semibold text-gray-800">Form Input Lembur</h3></div>
            <div className="p-6">
              <form onSubmit={handleSubmit}>
                <div className="mb-6 max-w-sm">
                  <label className="block text-sm font-semibold text-gray-700 mb-2">Periode Bulan</label>
                  <select value={periode} onChange={(e) => setPeriode(e.target.value)} className="w-full border px-3 py-2 rounded-lg text-sm bg-white">{BULAN_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}</select>
                </div>
                <div className="space-y-4">
                  {entries.map((entry) => (
                    <div key={entry.id} className="flex flex-col md:flex-row gap-4 p-4 bg-gray-50 border rounded-xl hover:border-blue-300 transition-colors">
                      <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">Tanggal</label><input type="date" required value={entry.tanggal} onChange={(e) => handleChangeEntry(entry.id, 'tanggal', e.target.value)} className="w-full border px-3 py-2 rounded-md text-sm bg-white" /></div>
                      <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">Mulai</label><input type="time" required value={entry.jamMulai} onChange={(e) => handleChangeEntry(entry.id, 'jamMulai', e.target.value)} className="w-full border px-3 py-2 rounded-md text-sm bg-white" /></div>
                      <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">Akhir</label><input type="time" required value={entry.jamBerakhir} onChange={(e) => handleChangeEntry(entry.id, 'jamBerakhir', e.target.value)} className="w-full border px-3 py-2 rounded-md text-sm bg-white" /></div>
                      <div className="flex items-end">{entries.length > 1 && <button type="button" onClick={() => handleRemoveEntry(entry.id)} className="px-3 py-2 border border-red-200 rounded-md text-red-600 bg-red-50 hover:bg-red-100"><Icon name="trash"/></button>}</div>
                    </div>
                  ))}
                </div>
                <button type="button" onClick={handleAddEntry} className="mt-4 px-4 py-2 border shadow-sm text-sm font-medium rounded-md bg-white hover:bg-gray-50"><Icon name="plus" className="mr-2"/>Tambah Hari</button>

                <div className="mt-8 pt-6 border-t">
                  <label className="block text-sm font-semibold mb-2">Upload SPKL (PDF)</label>
                  <div className="flex justify-center px-6 py-6 border-2 border-dashed rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors">
                    <div className="text-center">
                      <Icon name="cloud-arrow-up" className="text-4xl text-gray-400 mb-2" />
                      <label className="cursor-pointer text-blue-600 font-medium px-2 block text-sm">
                        Pilih file PDF <input id="file-upload" type="file" accept=".pdf" className="sr-only" onChange={handleFileChange} />
                      </label>
                      {spklFile && <div className="mt-2 text-sm text-green-600 flex justify-center items-center"><Icon name="circle-check" className="mr-1"/>{spklFile.name}</div>}
                    </div>
                  </div>
                </div>
                <div className="mt-8 flex justify-end">
                  <button type="submit" disabled={isSubmitting} className={`px-6 py-3 rounded-lg text-white font-medium ${isSubmitting ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    {isSubmitting ? 'Mengupload & Menyimpan...' : 'Simpan Data Lembur'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN KARYAWAN: HISTORI LEMBUR ---
    function HistoryLembur({ user, historyData }) {
      const currentMonth = BULAN_OPTIONS[new Date().getMonth()];
      const [filterPeriode, setFilterPeriode] = useState(currentMonth);
      const myData = historyData.filter(i => String(i.nik) === String(user.nik) && i.periode === filterPeriode);

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
          <div className="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
            <h3 className="text-lg font-semibold">Histori Lembur</h3>
            <select value={filterPeriode} onChange={(e) => setFilterPeriode(e.target.value)} className="w-40 px-2 py-1.5 border rounded-md text-sm bg-white">{BULAN_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}</select>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y">
              <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tanggal</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">SPKL</th></tr></thead>
              <tbody className="bg-white divide-y">
                {myData.length > 0 ? myData.map((item, i) => (
                  <tr key={i} className="hover:bg-gray-50">
                    <td className="px-6 py-4 text-sm font-medium">{item.tanggal}</td>
                    <td className="px-6 py-4 text-sm text-gray-600"><span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs">{item.jamMulai}</span> - <span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs">{item.jamBerakhir}</span></td>
                    <td className="px-6 py-4 text-sm text-blue-600 truncate max-w-[150px]" title={item.fileName}>
                      {item.fileUrl ? (
                        <a href={item.fileUrl} target="_blank" rel="noopener noreferrer" className="hover:underline flex items-center">
                          <Icon name="file-lines" className="mr-1"/>{item.fileName}
                        </a>
                      ) : (
                        <span className="flex items-center"><Icon name="file-lines" className="mr-1"/>{item.fileName}</span>
                      )}
                    </td>
                  </tr>
                )) : <tr><td colSpan="3" className="px-6 py-8 text-center text-sm text-gray-500">Tidak ada data di bulan ini.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
