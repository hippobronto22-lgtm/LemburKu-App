<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal LemburKu</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #f9fafb; font-family: sans-serif; }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root">
    <div style="text-align: center; margin-top: 20vh; font-family: sans-serif; color: #6b7280;">
      <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: #2563eb; margin-bottom: 15px;"></i>
      <p>Memuat Aplikasi...</p>
      <small style="font-size: 12px; color: #9ca3af;">Jika tampilan ini tidak berubah, periksa koneksi internet Anda.</small>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // KONFIGURASI SUPABASE (GANTI DENGAN MILIK ANDA)
    // ==========================================
    const SUPABASE_URL = 'https://xjrunvxerkyzchhvwqqx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqcnVudnhlcmt5emNoaHZ3cXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODc2NzUsImV4cCI6MjA5MDM2MzY3NX0.JhHTCpohg3_tJis4KJUhIihCwYkOej7lpWVkBh5exno'; 
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const Icon = ({ name, className }) => <i className={`fa-solid fa-${name} ${className}`}></i>;

    const BULAN_OPTIONS = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState(''); 
      
      const [users, setUsers] = useState([]);
      const [savedOvertimes, setSavedOvertimes] = useState([]);
      const [lokasiList, setLokasiList] = useState([]); 
      const [projectList, setProjectList] = useState([]); 
      const [isLoading, setIsLoading] = useState(true);
      const [isConfigured, setIsConfigured] = useState(true);
      
      const [userToEdit, setUserToEdit] = useState(null);

      useEffect(() => {
        const fetchData = async () => {
          if (SUPABASE_URL.includes('YOUR_PROJECT_URL') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) {
            console.warn("⚠️ Kredensial Supabase belum diisi.");
            setIsConfigured(false);
            setIsLoading(false);
            return;
          }

          try {
            const [usersRes, overtimesRes, lokasiRes, projectRes] = await Promise.all([
              supabase.from('users').select('*'),
              supabase.from('overtimes').select('*').order('timestamp', { ascending: false }),
              supabase.from('lokasi_kerja').select('*'),
              supabase.from('projects').select('*')
            ]);

            if (usersRes.error) throw usersRes.error;
            if (overtimesRes.error) throw overtimesRes.error;
            if (lokasiRes.error) throw lokasiRes.error;

            const mappedUsers = usersRes.data ? usersRes.data.map(u => ({...u, lokasiKerja: u.lokasi_kerja, jenisKelamin: u.jenis_kelamin, approverNik: u.approver_nik})) : [];
            const mappedOvertimes = overtimesRes.data ? overtimesRes.data.map(o => ({...o, jamMulai: o.jam_mulai, jamBerakhir: o.jam_berakhir, fileName: o.file_name, fileUrl: o.file_url, status: o.status || 'Pending', alasanReject: o.alasan_reject})) : [];
            const mappedLokasi = lokasiRes.data ? lokasiRes.data.map(l => ({...l, namaLokasi: l.nama_lokasi})) : [];
            const mappedProjects = projectRes.data ? projectRes.data.map(p => ({...p, namaProject: p.nama_project})) : [];

            setUsers(mappedUsers);
            setSavedOvertimes(mappedOvertimes);
            setLokasiList(mappedLokasi);
            setProjectList(mappedProjects);
          } catch (err) {
            console.error("Gagal memuat data dari Supabase: ", err.message || err);
          } finally {
            setIsLoading(false);
          }
        };

        fetchData();
      }, []);

      const handleLogin = (user) => {
        setCurrentUser(user);
        if (user.role === 'admin') setActiveTab('master_data');
        else if (user.role === 'approval') setActiveTab('approval_dashboard');
        else setActiveTab('input');
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveTab('');
      };

      const handleEditUserRedirect = (emp) => {
        setUserToEdit(emp);
        setActiveTab('master_data');
      };

      const handleSaveUser = async (userObj) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        
        const dbPayload = { 
          nik: userObj.nik, password: userObj.password, nama: userObj.nama, role: userObj.role, 
          lokasi_kerja: userObj.lokasiKerja, jenis_kelamin: userObj.jenisKelamin, project: userObj.project,
          approver_nik: userObj.approverNik || null
        };
        
        const existingIndex = users.findIndex(u => String(u.nik) === String(userObj.nik));
        if (existingIndex >= 0) {
          const updatedUsers = [...users];
          updatedUsers[existingIndex] = userObj;
          setUsers(updatedUsers);
        } else {
          setUsers([...users, userObj]);
        }
        
        const { error } = await supabase.from('users').upsert([dbPayload]);
        if (error) alert('Error menyimpan karyawan: ' + error.message);
      };

      const handleDeleteUser = async (nik) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        if (confirm("Yakin ingin menghapus karyawan ini?")) {
          setUsers(users.filter(u => String(u.nik) !== String(nik)));
          const { error } = await supabase.from('users').delete().eq('nik', nik);
          if (error) alert('Error menghapus karyawan: ' + error.message);
        }
      };

      const handleSaveUserList = async (newUsers) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        const updatedUsers = [...users];
        const dbPayloads = [];

        newUsers.forEach(newUser => {
          const existingIndex = updatedUsers.findIndex(u => String(u.nik) === String(newUser.nik));
          if (existingIndex >= 0) updatedUsers[existingIndex] = newUser;
          else updatedUsers.push(newUser);

          dbPayloads.push({ 
            nik: newUser.nik, password: newUser.password, nama: newUser.nama, role: newUser.role || 'employee', 
            lokasi_kerja: newUser.lokasiKerja, jenis_kelamin: newUser.jenisKelamin, project: newUser.project,
            approver_nik: newUser.approverNik || null
          });
        });
        setUsers(updatedUsers);

        const { error } = await supabase.from('users').upsert(dbPayloads);
        if (error) alert('Error Import karyawan massal: ' + error.message);
      };

      const handleSaveLokasi = async (locObj) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        const dbPayload = { id: locObj.id, nama_lokasi: locObj.namaLokasi };

        const existingIndex = lokasiList.findIndex(l => String(l.id) === String(locObj.id));
        if (existingIndex >= 0) {
          const updatedLokasi = [...lokasiList];
          updatedLokasi[existingIndex] = locObj;
          setLokasiList(updatedLokasi);
        } else {
          setLokasiList([...lokasiList, locObj]);
        }

        const { error } = await supabase.from('lokasi_kerja').upsert([dbPayload]);
        if (error) alert('Error menyimpan lokasi: ' + error.message);
      };

      const handleDeleteLokasi = async (id) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        if (confirm("Yakin ingin menghapus lokasi ini?")) {
          setLokasiList(lokasiList.filter(l => String(l.id) !== String(id)));
          const { error } = await supabase.from('lokasi_kerja').delete().eq('id', id);
          if (error) alert('Error menghapus lokasi: ' + error.message);
        }
      };

      const handleSaveProject = async (projObj) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        const dbPayload = { id: projObj.id, nama_project: projObj.namaProject };

        const existingIndex = projectList.findIndex(p => String(p.id) === String(projObj.id));
        if (existingIndex >= 0) {
          const updatedProj = [...projectList];
          updatedProj[existingIndex] = projObj;
          setProjectList(updatedProj);
        } else {
          setProjectList([...projectList, projObj]);
        }

        const { error } = await supabase.from('projects').upsert([dbPayload]);
        if (error) alert('Error menyimpan project: ' + error.message);
      };

      const handleDeleteProject = async (id) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        if (confirm("Yakin ingin menghapus project ini?")) {
          setProjectList(projectList.filter(p => String(p.id) !== String(id)));
          const { error } = await supabase.from('projects').delete().eq('id', id);
          if (error) alert('Error menghapus project: ' + error.message);
        }
      };

      const handleSaveOvertime = async (newData) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        setSavedOvertimes([...newData, ...savedOvertimes]); 
        
        const dbPayloads = newData.map(ot => ({
          id: ot.id, nik: ot.nik, periode: ot.periode, tanggal: ot.tanggal, 
          jam_mulai: ot.jamMulai, jam_berakhir: ot.jamBerakhir, 
          file_name: ot.fileName, file_url: ot.fileUrl, timestamp: ot.timestamp,
          status: 'Pending'
        }));

        const { error } = await supabase.from('overtimes').insert(dbPayloads);
        if (error) alert('Error menyimpan data lembur: ' + error.message);
      };

      const handleUpdateOvertimeStatus = async (id, status, reason = null) => {
        if (!isConfigured) return alert("Supabase belum dikonfigurasi.");
        
        const updatedOvertimes = savedOvertimes.map(ot => {
          if (ot.id === id) return { ...ot, status, alasanReject: reason };
          return ot;
        });
        setSavedOvertimes(updatedOvertimes);
        
        const payload = { status };
        if (reason) payload.alasan_reject = reason;

        const { error } = await supabase.from('overtimes').update(payload).eq('id', id);
        if (error) alert('Error update status lembur: ' + error.message);
      };

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
            <Icon name="circle-notch" className="h-10 w-10 text-blue-600 animate-spin mb-4" />
            <p className="text-gray-600 font-medium">Menghubungkan ke Database Supabase...</p>
          </div>
        );
      }

      if (!currentUser) return <Login onLogin={handleLogin} users={users} isConfigured={isConfigured} />;

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800">
          <nav className={`${currentUser.role === 'admin' ? 'bg-indigo-700' : 'bg-blue-600'} text-white shadow-md transition-colors`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <div className="flex items-center space-x-2">
                  <Icon name={currentUser.role === 'admin' ? "shield-halved" : "clock"} className="text-xl" />
                  <span className="font-bold text-xl tracking-wide">{currentUser.role === 'admin' ? 'Admin Portal' : 'LemburKu'}</span>
                </div>
                <div className="flex items-center space-x-4">
                  <span className={`text-sm px-3 py-1 rounded-full border hidden sm:block ${currentUser.role === 'admin' ? 'bg-indigo-800 border-indigo-500' : 'bg-blue-700 border-blue-500'}`}>
                    {currentUser.nama} ({currentUser.nik})
                  </span>
                  <button onClick={handleLogout} className={`flex items-center space-x-1 hover:text-white px-3 py-2 rounded-lg text-sm font-medium ${currentUser.role === 'admin' ? 'bg-indigo-800 hover:bg-indigo-900' : 'bg-blue-700 hover:bg-blue-800'}`}>
                    <Icon name="right-from-bracket" /><span>Keluar</span>
                  </button>
                </div>
              </div>
            </div>
          </nav>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {!isConfigured && (
              <div className="mb-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 flex items-start rounded-md shadow-sm">
                <Icon name="triangle-exclamation" className="text-yellow-500 mr-3 mt-0.5" />
                <div>
                  <h3 className="text-sm font-bold text-yellow-800">Peringatan Konfigurasi</h3>
                  <p className="text-sm text-yellow-700 mt-1">Aplikasi belum terhubung dengan database karena <strong>SUPABASE_URL</strong> dan <strong>SUPABASE_ANON_KEY</strong> masih menggunakan pengaturan awal. Silakan ganti dengan API Key Anda.</p>
                </div>
              </div>
            )}

            {/* TAB MENU UNTUK EMPLOYEE KARYAWAN */}
            {currentUser.role === 'employee' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-lg border border-gray-100 overflow-x-auto">
                <button onClick={() => setActiveTab('input')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'input' ? 'bg-blue-50 text-blue-700 shadow-sm border border-blue-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="file-lines" /> <span>Input Lembur</span>
                </button>
                <button onClick={() => setActiveTab('history')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'history' ? 'bg-blue-50 text-blue-700 shadow-sm border border-blue-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="clock-rotate-left" /> <span>Histori Lembur</span>
                </button>
              </div>
            )}

            {/* TAB MENU UNTUK APPROVAL */}
            {currentUser.role === 'approval' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-lg border border-gray-100 overflow-x-auto">
                <button onClick={() => setActiveTab('approval_dashboard')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'approval_dashboard' ? 'bg-orange-50 text-orange-700 shadow-sm border border-orange-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="check-to-slot" /> <span>Persetujuan Lembur</span>
                </button>
                <button onClick={() => setActiveTab('approver_report')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'approver_report' ? 'bg-orange-50 text-orange-700 shadow-sm border border-orange-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="file-excel" /> <span>Report Lembur</span>
                </button>
              </div>
            )}

            {/* TAB MENU UNTUK ADMIN */}
            {currentUser.role === 'admin' && (
              <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 max-w-2xl border border-gray-100 overflow-x-auto">
                <button onClick={() => setActiveTab('master_data')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'master_data' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="database" /> <span>Master Data</span>
                </button>
                <button onClick={() => setActiveTab('daftar_karyawan')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'daftar_karyawan' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="users" /> <span>Daftar Karyawan</span>
                </button>
                <button onClick={() => setActiveTab('report')} className={`flex-1 flex items-center justify-center space-x-2 py-2.5 px-3 text-sm font-medium rounded-lg transition-all whitespace-nowrap ${activeTab === 'report' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                  <Icon name="file-excel" /> <span>Report Lembur</span>
                </button>
              </div>
            )}

            <div className="transition-all duration-300">
              {currentUser.role === 'employee' && activeTab === 'input' && <InputLembur user={currentUser} onSave={handleSaveOvertime} />}
              {currentUser.role === 'employee' && activeTab === 'history' && <HistoryLembur user={currentUser} historyData={savedOvertimes} />}
              
              {currentUser.role === 'approval' && activeTab === 'approval_dashboard' && <ApprovalDashboard user={currentUser} users={users} overtimes={savedOvertimes} onUpdateStatus={handleUpdateOvertimeStatus} />}
              {currentUser.role === 'approval' && activeTab === 'approver_report' && <ApproverReportLembur user={currentUser} users={users} overtimes={savedOvertimes} />}
              
              {currentUser.role === 'admin' && activeTab === 'master_data' && 
                <AdminMasterData 
                  users={users} 
                  lokasiList={lokasiList} 
                  projectList={projectList}
                  onSaveUser={handleSaveUser} 
                  onSaveUserList={handleSaveUserList}
                  onSaveLokasi={handleSaveLokasi}
                  onDeleteLokasi={handleDeleteLokasi}
                  onSaveProject={handleSaveProject}
                  onDeleteProject={handleDeleteProject}
                  userToEdit={userToEdit}
                  clearUserToEdit={() => setUserToEdit(null)}
                />
              }
              {currentUser.role === 'admin' && activeTab === 'daftar_karyawan' && 
                <AdminDaftarKaryawan 
                  users={users} 
                  lokasiList={lokasiList} 
                  projectList={projectList}
                  onEditUser={handleEditUserRedirect} 
                  onDeleteUser={handleDeleteUser} 
                />
              }
              {currentUser.role === 'admin' && activeTab === 'report' && <AdminReportLembur users={users} overtimes={savedOvertimes} lokasiList={lokasiList} projectList={projectList} />}
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN LOGIN ---
    function Login({ onLogin, users, isConfigured }) {
      const [nik, setNik] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!isConfigured) {
          setError('Aplikasi belum dikonfigurasi dengan Supabase API Key.');
          return;
        }

        const user = users.find(u => String(u.nik) === String(nik) && String(u.password) === String(password));
        if (user) {
          setError('');
          onLogin(user);
        } else {
          setError('NIK atau Password salah. (Pastikan Anda sudah setup database)');
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gray-100 px-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-8 text-center text-white">
              <Icon name="clock" className="text-5xl text-blue-100 mb-3 block" />
              <h2 className="text-2xl font-bold">Portal Karyawan</h2>
              <p className="text-blue-100 text-sm mt-1">Sistem Manajemen Waktu & Lembur</p>
            </div>
            <div className="px-6 py-8">
              {!isConfigured && (
                <div className="mb-4 bg-yellow-50 border-l-4 border-yellow-400 p-3 flex items-start rounded text-sm text-yellow-800">
                  <Icon name="triangle-exclamation" className="mr-2 mt-0.5 text-yellow-500" />
                  <p>Aplikasi dalam mode pratinjau. Anda harus memasukkan SUPABASE_URL dan SUPABASE_ANON_KEY di dalam kode agar bisa login.</p>
                </div>
              )}
              {error && <div className="mb-4 bg-red-50 border-l-4 border-red-500 p-4 flex items-start"><Icon name="circle-exclamation" className="text-red-500 mr-2 mt-0.5" /><p className="text-sm text-red-700">{error}</p></div>}
              <form onSubmit={handleSubmit} className="space-y-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">NIK</label>
                  <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icon name="user" className="text-gray-400" /></div><input type="text" required value={nik} onChange={(e) => setNik(e.target.value)} className="block w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm" placeholder="Masukkan NIK" /></div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                  <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icon name="key" className="text-gray-400" /></div><input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm" placeholder="••••••••" /></div>
                </div>
                <button type="submit" className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm text-sm font-medium transition-colors">Masuk</button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN ADMIN: MASTER DATA ---
    function AdminMasterData({ users, lokasiList, projectList, onSaveUser, onSaveUserList, onSaveLokasi, onDeleteLokasi, onSaveProject, onDeleteProject, userToEdit, clearUserToEdit }) {
      
      const emptyUserForm = { nik: '', password: '', nama: '', role: 'employee', lokasiKerja: '', jenisKelamin: 'Laki-laki', project: '', approverNik: '' };
      const [userFormData, setUserFormData] = useState(emptyUserForm);
      const [isEditUserMode, setIsEditUserMode] = useState(false);
      const [userMsg, setUserMsg] = useState({ text: '', type: '' });

      const emptyLocForm = { id: '', namaLokasi: '' };
      const [locFormData, setLocFormData] = useState(emptyLocForm);
      const [isEditLocMode, setIsEditLocMode] = useState(false);

      const emptyProjForm = { id: '', namaProject: '' };
      const [projFormData, setProjFormData] = useState(emptyProjForm);
      const [isEditProjMode, setIsEditProjMode] = useState(false);

      // Hanya munculkan atasan dari lokasi kerja yang sama
      const approvers = users.filter(u => u.role === 'approval' && u.lokasiKerja === userFormData.lokasiKerja);

      useEffect(() => {
        if (userToEdit) {
          setUserFormData({
            nik: userToEdit.nik || '', password: userToEdit.password || '', nama: userToEdit.nama || '', role: userToEdit.role || 'employee',
            lokasiKerja: userToEdit.lokasiKerja || '', jenisKelamin: userToEdit.jenisKelamin || 'Laki-laki', project: userToEdit.project || '',
            approverNik: userToEdit.approverNik || ''
          });
          setIsEditUserMode(true);
          clearUserToEdit();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, [userToEdit, clearUserToEdit]);

      const showUserMsg = (text, type = 'success') => {
        setUserMsg({ text, type });
        setTimeout(() => setUserMsg({ text: '', type: '' }), 4000);
      };

      const handleUserChange = (e) => setUserFormData({ ...userFormData, [e.target.name]: e.target.value });
      
      const handleUserSubmit = (e) => {
        e.preventDefault();
        if (!userFormData.lokasiKerja && lokasiList.length > 0) userFormData.lokasiKerja = lokasiList[0].namaLokasi;
        if (!userFormData.project && projectList.length > 0) userFormData.project = projectList[0].namaProject;
        if (userFormData.role === 'employee' && !userFormData.approverNik) return showUserMsg('Atasan (Approver) wajib dipilih untuk role Karyawan.', 'error');
        if (!isEditUserMode && users.find(u => String(u.nik) === String(userFormData.nik))) return showUserMsg('NIK sudah terdaftar.', 'error');

        onSaveUser(userFormData);
        showUserMsg(isEditUserMode ? 'Karyawan diupdate!' : 'Karyawan ditambahkan!');
        setUserFormData(emptyUserForm);
        setIsEditUserMode(false);
      };

      // --- IMPORT EXCEL ---
      const handleDownloadTemplate = () => {
        const ws_data = [
          ['NIK', 'Password', 'Nama Lengkap', 'Role', 'Jenis Kelamin', 'Lokasi Kerja', 'Project', 'NIK Atasan'],
          ['1001', 'pass123', 'Budi Santoso', 'employee', 'Laki-laki', 'Kantor Pusat - Jakarta', 'Project Internal', '1002'],
          ['1002', 'admin123', 'Andi Manager', 'approval', 'Laki-laki', 'Kantor Pusat - Jakarta', 'Project Internal', '']
        ];
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "TemplateKaryawan");
        XLSX.writeFile(wb, "Template_Import_Karyawan.xlsx");
      };

      const handleImportExcel = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            const newUsers = jsonData.map(row => {
              const r = {};
              Object.keys(row).forEach(k => r[k.toLowerCase().trim()] = row[k]);
              return {
                nik: String(r['nik'] || ''),
                password: String(r['password'] || ''),
                nama: String(r['nama lengkap'] || r['nama'] || ''),
                role: String(r['role'] || 'employee').toLowerCase(),
                jenisKelamin: String(r['jenis kelamin'] || 'Laki-laki'),
                lokasiKerja: String(r['lokasi kerja'] || ''),
                project: String(r['project'] || ''),
                approverNik: String(r['nik atasan'] || '')
              };
            }).filter(u => u.nik && u.nama); 

            if (newUsers.length > 0) {
              onSaveUserList(newUsers);
              showUserMsg(`${newUsers.length} data karyawan berhasil diimport!`);
            } else {
              showUserMsg('Format data tidak valid atau file kosong.', 'error');
            }
          } catch (error) {
            showUserMsg('Gagal membaca file Excel.', 'error');
          }
          e.target.value = null; 
        };
        reader.readAsArrayBuffer(file);
      };

      const handleLocChange = (e) => setLocFormData({ ...locFormData, [e.target.name]: e.target.value });
      const handleLocSubmit = (e) => {
        e.preventDefault();
        onSaveLokasi({ ...locFormData, id: isEditLocMode ? locFormData.id : 'LOK-' + Date.now() });
        setLocFormData(emptyLocForm); setIsEditLocMode(false);
      };
      
      const handleProjChange = (e) => setProjFormData({ ...projFormData, [e.target.name]: e.target.value });
      const handleProjSubmit = (e) => {
        e.preventDefault();
        onSaveProject({ ...projFormData, id: isEditProjMode ? projFormData.id : 'PRJ-' + Date.now() });
        setProjFormData(emptyProjForm); setIsEditProjMode(false);
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
          {/* KOLOM KIRI: MASTER PROJECT & LOKASI */}
          <div className="lg:col-span-1 space-y-6">
            
            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
              <div className="bg-blue-50 px-4 py-3 border-b flex items-center gap-2">
                <Icon name="briefcase" className="text-blue-600" />
                <h3 className="text-base font-semibold text-blue-900">Master Project</h3>
              </div>
              <div className="p-4 border-b">
                <form onSubmit={handleProjSubmit} className="space-y-3">
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Nama Project</label>
                    <input type="text" name="namaProject" required value={projFormData.namaProject} onChange={handleProjChange} className="w-full border rounded-md px-3 py-2 text-sm" placeholder="Contoh: Project Alpha" />
                  </div>
                  <div className="flex gap-2">
                    <button type="submit" className="flex-1 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-md font-medium">{isEditProjMode ? 'Update' : 'Tambah'}</button>
                    {isEditProjMode && <button type="button" onClick={() => {setProjFormData(emptyProjForm); setIsEditProjMode(false);}} className="py-2 px-3 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-md">Batal</button>}
                  </div>
                </form>
              </div>
              <div className="p-0 max-h-[250px] overflow-y-auto">
                <table className="min-w-full divide-y">
                  <thead className="bg-gray-50 sticky top-0"><tr><th className="px-4 py-2 text-left text-xs text-gray-500 uppercase">Project</th><th className="px-4 py-2 text-right text-xs text-gray-500 uppercase">Aksi</th></tr></thead>
                  <tbody className="divide-y text-sm">
                    {projectList.length > 0 ? projectList.map(prj => (
                      <tr key={prj.id} className="hover:bg-gray-50">
                        <td className="px-4 py-2">{prj.namaProject}</td>
                        <td className="px-4 py-2 text-right">
                          <button onClick={() => { setProjFormData({ id: prj.id, namaProject: prj.namaProject }); setIsEditProjMode(true); }} className="text-blue-600 hover:bg-blue-50 p-1 rounded mr-1"><Icon name="pen-to-square"/></button>
                          <button onClick={() => onDeleteProject(prj.id)} className="text-red-600 hover:bg-red-50 p-1 rounded"><Icon name="trash"/></button>
                        </td>
                      </tr>
                    )) : <tr><td colSpan="2" className="text-center py-4 text-gray-500 text-xs">Data kosong</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
              <div className="bg-blue-50 px-4 py-3 border-b flex items-center gap-2">
                <Icon name="map-location-dot" className="text-blue-600" />
                <h3 className="text-base font-semibold text-blue-900">Master Lokasi Kerja</h3>
              </div>
              <div className="p-4 border-b">
                <form onSubmit={handleLocSubmit} className="space-y-3">
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Nama Lokasi</label>
                    <input type="text" name="namaLokasi" required value={locFormData.namaLokasi} onChange={handleLocChange} className="w-full border rounded-md px-3 py-2 text-sm" placeholder="Contoh: Site A - Sudirman" />
                  </div>
                  <div className="flex gap-2">
                    <button type="submit" className="flex-1 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-md font-medium">{isEditLocMode ? 'Update' : 'Tambah'}</button>
                    {isEditLocMode && <button type="button" onClick={() => {setLocFormData(emptyLocForm); setIsEditLocMode(false);}} className="py-2 px-3 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-md">Batal</button>}
                  </div>
                </form>
              </div>
              <div className="p-0 max-h-[250px] overflow-y-auto">
                <table className="min-w-full divide-y">
                  <thead className="bg-gray-50 sticky top-0"><tr><th className="px-4 py-2 text-left text-xs text-gray-500 uppercase">Lokasi</th><th className="px-4 py-2 text-right text-xs text-gray-500 uppercase">Aksi</th></tr></thead>
                  <tbody className="divide-y text-sm">
                    {lokasiList.length > 0 ? lokasiList.map(loc => (
                      <tr key={loc.id} className="hover:bg-gray-50">
                        <td className="px-4 py-2">{loc.namaLokasi}</td>
                        <td className="px-4 py-2 text-right">
                          <button onClick={() => { setLocFormData({ id: loc.id, namaLokasi: loc.namaLokasi }); setIsEditLocMode(true); }} className="text-blue-600 hover:bg-blue-50 p-1 rounded mr-1"><Icon name="pen-to-square"/></button>
                          <button onClick={() => onDeleteLokasi(loc.id)} className="text-red-600 hover:bg-red-50 p-1 rounded"><Icon name="trash"/></button>
                        </td>
                      </tr>
                    )) : <tr><td colSpan="2" className="text-center py-4 text-gray-500 text-xs">Data kosong</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* KOLOM KANAN: TAMBAH KARYAWAN */}
          <div className="lg:col-span-2 space-y-6">
            <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
              <div className="bg-indigo-50 px-6 py-4 border-b flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-indigo-100">
                <div className="flex items-center gap-2">
                  <Icon name="user-plus" className="text-indigo-600" />
                  <h3 className="text-lg font-semibold text-indigo-900">{isEditUserMode ? 'Edit Data Karyawan' : 'Tambah Karyawan Baru'}</h3>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  <button type="button" onClick={handleDownloadTemplate} className="inline-flex items-center px-3 py-1.5 rounded-md text-xs font-medium text-indigo-700 bg-indigo-100 hover:bg-indigo-200 transition-colors"><Icon name="download" className="mr-1.5"/> Template Excel</button>
                  <label className="cursor-pointer inline-flex items-center px-3 py-1.5 rounded-md text-xs font-medium text-green-700 bg-green-100 hover:bg-green-200 transition-colors"><Icon name="upload" className="mr-1.5"/> Import Excel<input type="file" accept=".xlsx, .xls" className="sr-only" onChange={handleImportExcel} /></label>
                </div>
              </div>
              <div className="p-6">
                {userMsg.text && <div className={`mb-4 p-3 rounded-lg flex items-center text-sm border ${userMsg.type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'}`}><Icon name={userMsg.type === 'error' ? 'circle-exclamation' : 'circle-check'} className="mr-2" /> {userMsg.text}</div>}
                
                {/* URUTAN FORM BARU SESUAI PERMINTAAN */}
                <form onSubmit={handleUserSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {/* 1. Project */}
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Data Project</label>
                    <select name="project" required value={userFormData.project} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white">
                      <option value="" disabled>-- Pilih Project --</option>
                      {projectList.map(prj => <option key={prj.id} value={prj.namaProject}>{prj.namaProject}</option>)}
                    </select>
                  </div>
                  {/* 2. Lokasi Project */}
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Lokasi Project</label>
                    <select name="lokasiKerja" required value={userFormData.lokasiKerja} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white">
                      <option value="" disabled>-- Pilih Lokasi --</option>
                      {lokasiList.map(loc => <option key={loc.id} value={loc.namaLokasi}>{loc.namaLokasi}</option>)}
                    </select>
                  </div>
                  {/* 3. NIK */}
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">NIK</label><input type="text" name="nik" required value={userFormData.nik} onChange={handleUserChange} disabled={isEditUserMode} className={`block w-full border rounded-md px-3 py-2 text-sm ${isEditUserMode ? 'bg-gray-100 cursor-not-allowed' : ''}`} /></div>
                  {/* 4. Nama Lengkap */}
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Nama Lengkap</label><input type="text" name="nama" required value={userFormData.nama} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm" /></div>
                  {/* 5. Password */}
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Password</label><input type="text" name="password" required value={userFormData.password} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm" /></div>
                  {/* 6. Jenis Kelamin */}
                  <div><label className="block text-xs font-semibold text-gray-700 mb-1">Jenis Kelamin</label><select name="jenisKelamin" value={userFormData.jenisKelamin} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                  {/* 7. Hak Akses */}
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">Hak Akses / Role</label>
                    <select name="role" value={userFormData.role} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white">
                      <option value="employee">Karyawan (Hanya Input Lembur)</option>
                      <option value="approval">Approval (Dapat Approve Lembur)</option>
                    </select>
                  </div>
                  {/* 8. Set Atasan */}
                  <div>
                    <label className="block text-xs font-semibold text-gray-700 mb-1">
                      Set Atasan (Approver) {userFormData.role === 'employee' && <span className="text-red-500">*</span>}
                    </label>
                    <select name="approverNik" required={userFormData.role === 'employee'} value={userFormData.approverNik} onChange={handleUserChange} className="block w-full border rounded-md px-3 py-2 text-sm bg-white text-gray-700">
                      <option value="" disabled={userFormData.role === 'employee'}>
                        {userFormData.lokasiKerja ? '-- Pilih Atasan --' : '-- Pilih Lokasi Terlebih Dahulu --'}
                      </option>
                      {approvers.map(a => <option key={a.nik} value={a.nik}>{a.nama} ({a.nik})</option>)}
                    </select>
                    <p className="text-[10px] text-gray-500 mt-1">Hanya menampilkan Atasan dari Lokasi Kerja yang sama.</p>
                  </div>

                  <div className="md:col-span-2 flex justify-end mt-2 gap-2 border-t pt-4">
                    {isEditUserMode && <button type="button" onClick={() => {setUserFormData(emptyUserForm); setIsEditUserMode(false);}} className="px-4 py-2 border rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">Batal Edit</button>}
                    <button type="submit" className="px-4 py-2 rounded-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700"><Icon name={isEditUserMode ? "floppy-disk" : "plus"} className="mr-2"/>{isEditUserMode ? 'Update Karyawan' : 'Simpan Karyawan'}</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- KOMPONEN ADMIN: DAFTAR KARYAWAN ---
    function AdminDaftarKaryawan({ users, lokasiList, projectList, onEditUser, onDeleteUser }) {
      const [filterProject, setFilterProject] = useState('Semua');
      const [filterLokasi, setFilterLokasi] = useState('Semua');

      const [appliedFilterProject, setAppliedFilterProject] = useState('Semua');
      const [appliedFilterLokasi, setAppliedFilterLokasi] = useState('Semua');

      const approvers = users.filter(u => u.role === 'approval');

      const filteredEmployees = users.filter(u => {
        if (u.role === 'admin') return false; 
        if (appliedFilterProject !== 'Semua' && u.project !== appliedFilterProject) return false;
        if (appliedFilterLokasi !== 'Semua' && u.lokasiKerja !== appliedFilterLokasi) return false;
        return true;
      });

      const handleSearch = () => {
        setAppliedFilterProject(filterProject);
        setAppliedFilterLokasi(filterLokasi);
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in">
           <div className="bg-indigo-50 px-6 py-4 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-indigo-100">
             <div className="flex items-center gap-2 w-full md:w-auto">
               <Icon name="users" className="text-indigo-600" />
               <h3 className="text-lg font-semibold text-indigo-900">Daftar Karyawan</h3>
             </div>
             
             <div className="flex flex-wrap gap-2 w-full md:w-auto">
               <select value={filterProject} onChange={(e) => setFilterProject(e.target.value)} className="w-full md:w-36 px-2 py-1.5 text-xs border border-gray-300 rounded-md bg-white">
                 <option value="Semua">Semua Project</option>
                 {projectList.map(prj => <option key={prj.id} value={prj.namaProject}>{prj.namaProject}</option>)}
               </select>
               <select value={filterLokasi} onChange={(e) => setFilterLokasi(e.target.value)} className="w-full md:w-36 px-2 py-1.5 text-xs border border-gray-300 rounded-md bg-white">
                 <option value="Semua">Semua Lokasi</option>
                 {lokasiList.map(loc => <option key={loc.id} value={loc.namaLokasi}>{loc.namaLokasi}</option>)}
               </select>
               <button onClick={handleSearch} className="inline-flex justify-center items-center px-4 py-1.5 rounded-md text-xs font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors w-full md:w-auto">
                 <Icon name="magnifying-glass" className="mr-1.5"/> Cari
               </button>
             </div>
           </div>
           <div className="overflow-x-auto">
             <table className="min-w-full divide-y">
               <thead className="bg-gray-50"><tr><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">NIK/Nama</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role & Approver</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Lokasi</th><th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Project</th><th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Aksi</th></tr></thead>
               <tbody className="bg-white divide-y">
                 {filteredEmployees.length > 0 ? filteredEmployees.map((emp) => {
                   const approver = approvers.find(a => a.nik === emp.approverNik);
                   return (
                     <tr key={emp.nik} className="hover:bg-gray-50">
                       <td className="px-4 py-3"><div className="text-sm font-medium text-gray-900">{emp.nama}</div><div className="text-xs text-gray-500">{emp.nik} | {emp.jenisKelamin === 'Laki-laki' ? 'L' : 'P'}</div></td>
                       <td className="px-4 py-3 text-sm text-gray-600">
                         <span className={`px-2 py-0.5 rounded text-[10px] uppercase font-semibold ${emp.role === 'approval' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}`}>{emp.role}</span>

    // --- KOMPONEN APPROVAL DASHBOARD ---
    function ApprovalDashboard({ user, users, overtimes, onUpdateStatus }) {
      const [rejectingId, setRejectingId] = useState(null);
      const [rejectReason, setRejectReason] = useState('');

      const bawahanNiks = users.filter(u => String(u.approverNik) === String(user.nik)).map(u => u.nik);
      
      // Update: Hanya tampilkan data dengan status Pending, tanpa filter periode
      const approvalData = overtimes.filter(ot => bawahanNiks.includes(ot.nik) && ot.status === 'Pending');

      const getStatusBadge = (status) => {
        switch(status) {
          case 'Approved': return <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[11px] font-bold uppercase"><Icon name="check" className="mr-1" />{status}</span>;
          case 'Rejected': return <span className="bg-red-100 text-red-700 px-2 py-1 rounded text-[11px] font-bold uppercase"><Icon name="xmark" className="mr-1" />{status}</span>;
          default: return <span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[11px] font-bold uppercase"><Icon name="clock" className="mr-1" />{status}</span>;
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in">
          {/* Update: Judul di kiri, filter periode dihapus */}
          <div className="bg-orange-50 px-6 py-4 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-orange-100">
            <div className="flex items-center gap-2">
              <Icon name="check-to-slot" className="text-orange-600"/>
              <h3 className="text-lg font-semibold text-orange-900">Daftar Persetujuan Lembur</h3>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y">
              {/* Update: Kolom SPKL dihilangkan */}
              <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Karyawan</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu Lembur</th><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status & Aksi</th></tr></thead>
              <tbody className="bg-white divide-y">
                {approvalData.length > 0 ? approvalData.map((item, i) => {
                  const emp = users.find(u => u.nik === item.nik) || {};
                  return (
                    <tr key={item.id} className="hover:bg-gray-50">
                      <td className="px-6 py-4"><div className="text-sm font-medium text-gray-900">{emp.nama}</div><div className="text-xs text-gray-500">NIK: {emp.nik} | {emp.project}</div></td>
                      <td className="px-6 py-4 text-sm text-gray-600">

    // --- KOMPONEN KARYAWAN: INPUT LEMBUR ---
    function InputLembur({ user, onSave }) {
      const currentMonth = BULAN_OPTIONS[new Date().getMonth()];
      const [periode, setPeriode] = useState(currentMonth);
      const [entries, setEntries] = useState([{ id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
      const [spklFile, setSpklFile] = useState(null);
      const [successMsg, setSuccessMsg] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleAddEntry = () => setEntries([...entries, { id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
      const handleRemoveEntry = (id) => entries.length > 1 && setEntries(entries.filter(e => e.id !== id));
      const handleChangeEntry = (id, field, val) => setEntries(entries.map(e => e.id === id ? { ...e, [field]: val } : e));
      
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file && file.type === 'application/pdf') setSpklFile(file);
        else { alert('Harap unggah file PDF.'); e.target.value = null; }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!entries.every(e => e.tanggal && e.jamMulai && e.jamBerakhir)) return alert('Lengkapi data jam lembur.');
        if (!spklFile) return alert('Unggah form SPKL (PDF).');

        setIsSubmitting(true);

        try {
          const fileExt = spklFile.name.split('.').pop();
          const uniqueFileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
          
          const { error: uploadError } = await supabase.storage.from('spkl_files').upload(uniqueFileName, spklFile);
          if (uploadError) throw uploadError;

          const { data: publicUrlData } = supabase.storage.from('spkl_files').getPublicUrl(uniqueFileName);
          const fileUrl = publicUrlData.publicUrl;

          const dataToSave = entries.map(entry => ({
            id: entry.id + Math.random().toString().substr(2, 5),
            nik: user.nik, periode: periode, tanggal: entry.tanggal,
            jamMulai: entry.jamMulai, jamBerakhir: entry.jamBerakhir,
            fileName: spklFile.name, fileUrl: fileUrl, timestamp: new Date().toISOString()
          }));

          await onSave(dataToSave); 

          setSuccessMsg('Data pengajuan lembur berhasil dikirim!');
          setEntries([{ id: Date.now(), tanggal: '', jamMulai: '', jamBerakhir: '' }]);
          setSpklFile(null);
          document.getElementById('file-upload').value = '';
          setIsSubmitting(false);
          setTimeout(() => setSuccessMsg(''), 4000);

        } catch (error) {
          alert('Gagal mengupload file ke Supabase: ' + error.message);
          setIsSubmitting(false);
        }
      };

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div className="bg-gray-50 px-6 py-4 border-b"><h3 className="text-lg font-semibold text-gray-800">Profil Karyawan</h3></div>
            <div className="p-6 grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Nama</p><p className="font-medium">{user.nama}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">L/P</p><p>{user.jenisKelamin}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Lokasi</p><p>{user.lokasiKerja}</p></div>
              <div><p className="text-xs text-gray-500 uppercase font-semibold">Project</p><p>{user.project}</p></div>
            </div>
          </div>

          {successMsg && <div className="bg-green-50 border border-green-200 p-4 rounded-xl flex items-center text-green-700 text-sm"><Icon name="circle-check" className="mr-3" />{successMsg}</div>}

          <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div className="bg-gray-50 px-6 py-4 border-b"><h3 className="text-lg font-semibold text-gray-800">Form Input Lembur</h3></div>
            <div className="p-6">
              <form onSubmit={handleSubmit}>
                <div className="mb-6 max-w-sm">
                  <label className="block text-sm font-semibold text-gray-700 mb-2">Periode Bulan</label>
                  <select value={periode} onChange={(e) => setPeriode(e.target.value)} className="w-full border px-3 py-2 rounded-lg text-sm bg-white">{BULAN_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}</select>
                </div>
                <div className="space-y-4">
                  {entries.map((entry) => (
                    <div key={entry.id} className="flex flex-col md:flex-row gap-4 p-4 bg-gray-50 border rounded-xl hover:border-blue-300 transition-colors">
                      <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">Tanggal</label><input type="date" required value={entry.tanggal} onChange={(e) => handleChangeEntry(entry.id, 'tanggal', e.target.value)} className="w-full border px-3 py-2 rounded-md text-sm bg-white" /></div>
                      <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">Mulai</label><input type="time" required value={entry.jamMulai} onChange={(e) => handleChangeEntry(entry.id, 'jamMulai', e.target.value)} className="w-full border px-3 py-2 rounded-md text-sm bg-white" /></div>
                      <div className="flex-1"><label className="block text-xs text-gray-500 mb-1">Akhir</label><input type="time" required value={entry.jamBerakhir} onChange={(e) => handleChangeEntry(entry.id, 'jamBerakhir', e.target.value)} className="w-full border px-3 py-2 rounded-md text-sm bg-white" /></div>
                      <div className="flex items-end">{entries.length > 1 && <button type="button" onClick={() => handleRemoveEntry(entry.id)} className="px-3 py-2 border border-red-200 rounded-md text-red-600 bg-red-50 hover:bg-red-100"><Icon name="trash"/></button>}</div>
                    </div>
                  ))}
                </div>
                <button type="button" onClick={handleAddEntry} className="mt-4 px-4 py-2 border shadow-sm text-sm font-medium rounded-md bg-white hover:bg-gray-50"><Icon name="plus" className="mr-2"/>Tambah Hari</button>

                <div className="mt-8 pt-6 border-t">
                  <label className="block text-sm font-semibold mb-2">Upload SPKL (PDF)</label>
                  <div className="flex justify-center px-6 py-6 border-2 border-dashed rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors">
                    <div className="text-center">
                      <Icon name="cloud-arrow-up" className="text-4xl text-gray-400 mb-2" />
                      <label className="cursor-pointer text-blue-600 font-medium px-2 block text-sm">
                        Pilih file PDF <input id="file-upload" type="file" accept=".pdf" className="sr-only" onChange={handleFileChange} />
                      </label>
                      {spklFile && <div className="mt-2 text-sm text-green-600 flex justify-center items-center"><Icon name="circle-check" className="mr-1"/>{spklFile.name}</div>}
                    </div>
                  </div>
                </div>
                <div className="mt-8 flex justify-end">
                  <button type="submit" disabled={isSubmitting} className={`px-6 py-3 rounded-lg text-white font-medium ${isSubmitting ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    {isSubmitting ? 'Mengupload & Menyimpan...' : 'Kirim Pengajuan Lembur'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

      const currentMonth = BULAN_OPTIONS[new Date().getMonth()];
      const [filterPeriode, setFilterPeriode] = useState(currentMonth);
      const myData = historyData.filter(i => String(i.nik) === String(user.nik) && i.periode === filterPeriode);

      const getStatusBadge = (status) => {
        switch(status) {
          case 'Approved': return <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold uppercase"><Icon name="check" className="mr-1" />{status}</span>;
          case 'Rejected': return <span className="bg-red-100 text-red-700 px-2 py-1 rounded text-[10px] font-bold uppercase"><Icon name="xmark" className="mr-1" />{status}</span>;
          default: return <span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold uppercase"><Icon name="clock" className="mr-1" />{status}</span>;
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden animate-fade-in">
          <div className="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
            <h3 className="text-lg font-semibold">Histori Lembur</h3>
            <select value={filterPeriode} onChange={(e) => setFilterPeriode(e.target.value)} className="w-40 px-2 py-1.5 border rounded-md text-sm bg-white">{BULAN_OPTIONS.map(b => <option key={b} value={b}>{b}</option>)}</select>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y">
              <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tanggal</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">SPKL</th><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status & Ket</th></tr></thead>
              <tbody className="bg-white divide-y">
                {myData.length > 0 ? myData.map((item, i) => (
                  <tr key={item.id} className="hover:bg-gray-50">
                    <td className="px-6 py-4 text-sm font-medium">{item.tanggal}</td>
                    <td className="px-6 py-4 text-sm text-gray-600"><span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs">{item.jamMulai}</span> - <span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded text-xs">{item.jamBerakhir}</span></td>
                    <td className="px-6 py-4 text-sm text-blue-600 truncate max-w-[150px]" title={item.fileName}>
                      {item.fileUrl ? <a href={item.fileUrl} target="_blank" rel="noopener noreferrer" className="hover:underline flex items-center"><Icon name="file-lines" className="mr-1"/>{item.fileName}</a> : <span className="flex items-center"><Icon name="file-lines" className="mr-1"/>{item.fileName}</span>}
                    </td>
                    <td className="px-6 py-4 text-center">
                      <div className="mb-1">{getStatusBadge(item.status)}</div>
                      {item.status === 'Rejected' && item.alasanReject && <div className="text-[10px] text-gray-500 truncate max-w-[120px] mx-auto" title={item.alasanReject}>Ket: {item.alasanReject}</div>}
                    </td>
                  </tr>
                )) : <tr><td colSpan="4" className="px-6 py-8 text-center text-sm text-gray-500">Tidak ada data di bulan ini.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
